<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /*
     * FIGTREE FONT (self-hosted for Figma plugin sandbox compatibility)
     * Using WOFF2 format with base64 encoding for best compatibility
     */
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/Figtree-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('fonts/Figtree-Medium.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('fonts/Figtree-SemiBold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('fonts/Figtree-Bold.woff2') format('woff2');
    }

    /* 
     * DESIGN TOKENS (inlined for Figma plugin sandbox compatibility)
     */
    :root {
      /* === Typography System (from Figma) === */
      --heading-h1-size: 12px;
      --heading-h1-weight: 600;
      --heading-h1-line-height: 100%;
      --heading-h2-size: 11px;
      --heading-h2-weight: 500;
      --heading-h2-line-height: 91%;
      --body-md-size: 11px;
      --body-md-weight: 400;
      --body-md-line-height: 130%;
      --body-lg-size: 12px;
      --body-lg-weight: 400;
      --body-lg-line-height: 120%;
      --body-sm-size: 10px;
      --body-sm-weight: 400;
      --body-sm-line-height: 130%;
      --label-size: 9px;
      --label-weight: 500;
      --label-line-height: 100%;
      --input-text-size: 11px;
      --input-text-weight: 400;
      --input-text-line-height: 91%;

      /* === Colors === */
      --primary: #6F4CFF;
      --primary-foreground: #FFFFFF;
      --primary-hover: #5F3DE6;
      --primary-active: #4C2FCC;
      --primary-soft: #F0EBFF;
      --background: #FFFFFF;
      --background-subtle: #F9FAFB;
      --background-surface: #FFFFFF;
      --background-muted: #ECEFF2;
      --foreground: #0F1729;
      --text-secondary: #333B47;
      --text-muted: #3F4C5F;
      --text-subtle: #D1D5DB;
      --border: #EDEDF1;
      --border-dark: #D8DBDF;
      --accent-success: #126930;
      --accent-success-bg: #eaf7f0;
      --accent-primary-dark: #18305a;
      --typography-h1-color: #18305a;
      --typography-h2-color: #18305a;
      --typography-meta-color: #4a5a70;

      /* === Spacing === */
      --space-4: 4px;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-24: 24px;

      /* === Border Radius === */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --radius-xl: 18px;

      /* === Component Variables === */
      --section-padding: 16px;
      --section-gap: 16px;
      --section-radius: 18px;
      --section-shadow: 0 4px 16px 0 rgba(40,60,90,0.06);
      --input-bg: #FFFFFF;
      --input-border: 1px solid #dbe3ef;
      --input-radius: 4px;
      --input-padding-x: 9px;
      --input-padding-y: 7px;
      --input-height: 40px;
      --button-padding: 6px;
      --button-radius: 4px;
      --button-gap: 4px;
      --container-gap: 4px;
      --variant-card-bg: #ECEFF2;
      --variant-card-border: #EDEDF1;
      --variant-card-shadow: 0 2px 8px 0 rgba(40,60,90,0.06);
      --variant-traffic-bg: #eaf7f0;
      --variant-traffic-border: #b6e2c6;
      --variant-traffic-color: #126930;

      /* === Input Field Component (from Figma node 353-7322) === */
      --input-field-bg: rgba(34, 39, 47, 0.05);
      --input-field-border-color: rgba(34, 39, 47, 0.1);
      --input-field-border: 1px solid rgba(34, 39, 47, 0.1);
      --input-field-radius: 4px;
      --input-field-padding-x: 9px;
      --input-field-padding-y: 7px;
      --input-field-gap: 8px;
      --input-field-label-gap: 5px;
      --input-field-horizontal-gap: 12px;
      --input-field-text-color: #3f4c5f;
      --input-field-placeholder-opacity: 0.8;
      --input-field-hover-bg: rgba(34, 39, 47, 0.08);
      --input-field-hover-border: rgba(34, 39, 47, 0.15);
      --input-field-focus-border: #6F4CFF;
      --input-field-focus-shadow: 0 0 0 2px rgba(111, 76, 255, 0.15);
    }

    /* 
     * FIGMA PLUGIN TYPOGRAPHY
     */
    
    /* Reset & Base Typography */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    /* Heading 1 */
    h1 {
      font-size: var(--heading-h1-size);
      font-weight: var(--heading-h1-weight);
      line-height: var(--heading-h1-line-height);
      color: var(--typography-h1-color);
      letter-spacing: -0.01em;
    }
    
    /* Heading 2 */
    h2 {
      font-size: var(--heading-h2-size);
      font-weight: var(--heading-h2-weight);
      line-height: var(--heading-h2-line-height);
      color: var(--typography-h2-color);
      letter-spacing: -0.005em;
    }
    
    /* Body Medium (default) */
    p, .body-md {
      font-size: var(--body-md-size);
      font-weight: var(--body-md-weight);
      line-height: var(--body-md-line-height);
      color: var(--text-secondary);
    }
    
    /* Body Large */
    .body-lg {
      font-size: var(--body-lg-size);
      font-weight: var(--body-lg-weight);
      line-height: var(--body-lg-line-height);
      color: var(--text-secondary);
    }
    
    /* Body Small */
    .body-sm {
      font-size: var(--body-sm-size);
      font-weight: var(--body-sm-weight);
      line-height: var(--body-sm-line-height);
      color: var(--text-muted);
    }
    
    /* Form Elements */
    input, button, select, textarea {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: var(--body-md-size);
    }

    /* App Container */
    .app {
      background: var(--background-subtle);
      min-height: 100vh;
    }

    /* Section Header (from Figma: padding=16px, spacing=16px) */
    .section-header {
      background: var(--background-surface);
      border-bottom: 1px solid var(--border);
      padding: var(--section-padding);
    }

    .header-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      margin-bottom: var(--space-16);
    }

    .header-inputs {
      display: flex;
      flex-direction: column;
      gap: var(--space-16);
    }

    /* Form Inputs */
    .Input {
      background: var(--input-bg);
      border: var(--input-border);
      border-radius: var(--input-radius);
      height: var(--input-height);
      padding: var(--input-padding-y) var(--input-padding-x);
      color: var(--foreground);
      font-size: var(--input-text-size);
      font-weight: var(--input-text-weight);
      line-height: var(--input-text-line-height);
    }

    .Input::placeholder {
      color: var(--text-subtle);
    }

    .Input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }

    /* Form Container*/
    .form-container {
      display: flex;
      flex-direction: column;
    }

    /* Section Metrics & Events */
    .section-metrics,
    .section-events {
      background: var(--background-surface);
      border-bottom: 1px solid var(--border);
      padding: var(--space-16);
    }

    .metrics-header,
    .events-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-16);
    }

    .events-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    .events-header-left h2 {
      padding: 4px 0;
    }

    /* Add Event Button */
    .btn-add-event {
      width: 26px;
      height: 24px;
      border-radius: var(--button-radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-add-event:hover {
      background: rgba(34, 39, 47, 0.08);
    }

    .btn-add-event svg {
      width: 14px;
      height: 14px;
    }

    .metrics-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    .metrics-count,
    .events-count {
      font-size: var(--body-md-size);
      font-weight: 400;
      color: var(--text-muted);
    }

    /* Add Metric Button (from Figma: radius=4px) */
    .btn-add-metric {
      width: 24px;
      height: 24px;
      border-radius: var(--button-radius);
      border: 1px solid var(--border);
      background: var(--background-surface);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-add-metric:hover {
      background: var(--background-muted);
      border-color: var(--border-dark);
    }

    .btn-add-metric:active {
      background: var(--background-subtle);
    }

    /* Metric Cards */
    .metrics-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .metric-row {
      display: flex;
      align-items: flex-end;
      gap: var(--space-8);
      padding-bottom: var(--space-16);
      border-bottom: 1px dashed transparent;
    }

    .metric-row:not(:last-child) {
      border-bottom-color: var(--border);
    }

    .metric-row + .metric-row {
      padding-top: var(--space-16);
    }

    /* Metric name field (flexible width) */
    .metric-name-field {
      flex: 1;
      min-width: 0;
    }

    /* Min/Max range container */
    .metric-range-container {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      padding-left: var(--space-8);
    }

    .metric-range-field {
      width: 50px;
    }

    .metric-range-separator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 44px;
      padding-bottom: 7px;
    }

    .metric-range-separator span {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 10px;
    }

    /* Delete button */
    .metric-delete-btn {
      width: 26px;
      height: 24px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .metric-delete-btn:hover {
      background: rgba(242, 78, 30, 0.1);
      color: #f24e1e;
    }

    .metric-delete-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Empty state */
    .metrics-empty-state {
      text-align: center;
      padding: var(--space-24);
      color: var(--text-muted);
      font-size: var(--body-md-size);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
    }

    .metrics-empty-state.hidden {
      display: none;
    }

    /* Tooltip styling */
    [data-tooltip] {
      position: relative;
      cursor: help;
    }

    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--foreground);
      color: var(--background-surface);
      padding: var(--space-8) var(--space-12);
      border-radius: var(--radius-xs);
      font-size: 9px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
    }

    [data-tooltip]::before {
      content: '';
      position: absolute;
      bottom: 118%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--foreground);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
    }

    [data-tooltip]:hover::after,
    [data-tooltip]:hover::before {
      opacity: 1;
    }

    /* ============================================
     * FLOW SECTION (Events + Variants)
     * ============================================ */
    
    /* Events List Container */
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Individual Event Row */
    .event-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .event-row-main {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    /* Event step number badge */
    .event-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2px;
    }

    .event-step-badge {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-secondary);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .event-flow-line {
      width: 1px;
      height: 16px;
      background: var(--border-dark);
    }

    /* Event input field container */
    .event-input-container {
      flex: 1;
      min-width: 0;
    }

    /* Event action buttons */
    .event-actions {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    .event-action-btn {
      width: 26px;
      height: 24px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .event-action-btn:hover {
      background: rgba(34, 39, 47, 0.08);
    }

    .event-action-btn.delete:hover {
      background: rgba(242, 78, 30, 0.1);
      color: #f24e1e;
    }

    .event-action-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Variants container (nested under event) */
    .event-variants-container {
      display: flex;
      gap: var(--space-8);
      margin-left: 9px;
      padding-left: var(--space-8);
    }

    .event-variants-line {
      width: 1px;
      background: var(--border-dark);
      min-height: 40px;
    }

    .variants-list {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* Variant Card */
    .variant-card {
      display: flex;
      align-items: flex-start;
      gap: var(--space-8);
      padding: var(--space-12) var(--space-8);
      background: var(--background-surface);
      border-bottom: 1px dashed var(--border);
    }

    .variant-card:last-child {
      border-bottom: none;
    }

    /* Variant letter badge */
    .variant-badge {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .variant-badge.variant-a { background: #2563eb; color: #fff; }
    .variant-badge.variant-b { background: #0eab43; color: #fff; }
    .variant-badge.variant-c { background: #dd7602; color: #fff; }
    .variant-badge.variant-d { background: #8b5cf6; color: #fff; }
    .variant-badge.variant-add { background: var(--border-dark); color: var(--text-secondary); }

    /* Variant grip handle */
    .variant-grip {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .variant-grip:hover {
      color: var(--text-secondary);
    }

    .variant-grip svg {
      width: 12px;
      height: 12px;
    }

    /* Variant content area */
    .variant-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-16);
      flex: 1;
      min-width: 0;
    }

    .variant-row {
      display: flex;
      gap: var(--space-8);
    }

    .variant-name-field {
      flex: 1;
      min-width: 0;
    }

    .variant-traffic-field {
      width: 70px;
      flex-shrink: 0;
    }

    /* Variant metrics row */
    .variant-metrics-row {
      display: flex;
      gap: var(--space-16);
      align-items: flex-end;
    }

    .variant-metric-field {
      flex: 1;
      min-width: 60px;
    }

    /* Variant winner section */
    .variant-winner {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .variant-winner-label {
      font-size: 9px;
      font-weight: 500;
      color: var(--input-field-text-color);
    }

    .variant-winner-checkbox {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      cursor: pointer;
    }

    .variant-winner-checkbox input {
      width: 14px;
      height: 14px;
      accent-color: var(--primary);
    }

    .variant-winner-checkbox span {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Set as winner button */
    .btn-set-winner {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: 6px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .btn-set-winner:hover {
      background: rgba(234, 179, 8, 0.1);
      color: #ca8a04;
    }

    .btn-set-winner.is-winner {
      background: rgba(234, 179, 8, 0.15);
      color: #ca8a04;
    }

    .btn-set-winner svg {
      width: 14px;
      height: 14px;
    }

    /* Variant actions */
    .variant-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      flex-shrink: 0;
    }

    .variant-action-btn {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .variant-action-btn:hover {
      background: rgba(34, 39, 47, 0.08);
    }

    .variant-action-btn.remove:hover {
      background: rgba(242, 78, 30, 0.1);
      color: #f24e1e;
    }

    .variant-action-btn svg {
      width: 12px;
      height: 12px;
    }

    /* Empty state for events */
    .events-empty-state {
      text-align: center;
      padding: var(--space-24);
      color: var(--text-muted);
      font-size: var(--body-md-size);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
    }

    .events-empty-state.hidden {
      display: none;
    }

    /* Footer Section */
    .section-footer {
      display: flex;
      gap: var(--space-12);
      padding-top: var(--space-8);
    }

    /* Buttons */
    /* Buttons (from Figma: padding=6px, radius=4px, gap=4px) */
    .Button {
      height: var(--input-height);
      padding: var(--button-padding) var(--space-24);
      border-radius: var(--button-radius);
      font-size: var(--body-md-size);
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--button-gap);
      transition: background 0.15s, box-shadow 0.15s;
    }

    .Button.primary {
      background: var(--primary);
      color: var(--primary-foreground);
    }

    .Button.primary:hover {
      background: var(--primary-hover);
    }

    .Button.primary:active {
      background: var(--primary-active);
    }

    .Button.secondary {
      background: var(--background-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .Button.secondary:hover {
      background: var(--background-muted);
      border-color: var(--border-dark);
    }

    /* ============================================
     * INPUT FIELD COMPONENT (from Figma 353-7322)
     * Props: label, showLabel, showRText, showRIcon, showLText, smallText, help, text
     * Variants: state (default/entered), variant (vertical/horizontal), hover (no/yes)
     * ============================================ */
    
    /* Base Input Field Container */
    .InputField {
      display: flex;
      flex-direction: column;
      gap: var(--input-field-label-gap);
      width: 100%;
    }

    /* Horizontal variant */
    .InputField.horizontal {
      flex-direction: row;
      align-items: center;
      gap: var(--input-field-horizontal-gap);
    }

    .InputField.horizontal .InputField__label {
      flex-shrink: 0;
      min-width: fit-content;
    }

    .InputField.horizontal .InputField__wrapper {
      flex: 1;
    }

    /* Label */
    .InputField__label {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 9px;
      font-weight: 500;
      line-height: 100%;
      letter-spacing: 0.09px;
      color: var(--input-field-text-color);
      padding: 3px 0;
    }

    .InputField__label.hidden {
      display: none;
    }

    /* Input wrapper (the actual input box) */
    .InputField__wrapper {
      display: flex;
      align-items: center;
      gap: var(--input-field-gap);
      background: var(--input-field-bg);
      border: var(--input-field-border);
      border-radius: var(--input-field-radius);
      padding: var(--input-field-padding-y) var(--input-field-padding-x);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    /* Hover state */
    .InputField__wrapper:hover,
    .InputField.hover .InputField__wrapper {
      background: var(--input-field-hover-bg);
      border-color: var(--input-field-hover-border);
    }

    /* Focus state */
    .InputField__wrapper:focus-within {
      border-color: var(--input-field-focus-border);
      box-shadow: var(--input-field-focus-shadow);
    }

    /* Left text (prefix like "(CR)") */
    .InputField__prefix {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 400;
      line-height: 100%;
      color: var(--input-field-text-color);
      flex-shrink: 0;
    }

    .InputField__prefix.hidden {
      display: none;
    }

    /* The actual input element */
    .InputField__input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 400;
      line-height: 10px;
      color: var(--foreground);
      min-width: 0;
    }

    .InputField__input::placeholder {
      color: var(--input-field-text-color);
      opacity: var(--input-field-placeholder-opacity);
    }

    /* State: entered - placeholder hidden, value shown */
    .InputField.entered .InputField__input::placeholder {
      opacity: 0;
    }

    /* Right text (suffix) */
    .InputField__suffix {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 400;
      line-height: 100%;
      color: var(--input-field-text-color);
      flex-shrink: 0;
    }

    .InputField__suffix.hidden {
      display: none;
    }

    /* Right icon (dropdown arrow) */
    .InputField__icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--foreground);
    }

    .InputField__icon.hidden {
      display: none;
    }

    .InputField__icon svg {
      width: 12px;
      height: 12px;
    }
    /* ============================================
     * LINKS SECTION
     * External links: Figma, Jira, Miro
     * ============================================ */
    
    .section-links {
      background: var(--background-surface);
      border: 1px solid var(--border);
      padding: var(--space-16);
    }

    /* Links subsection inside events section */
    .links-subsection {
      margin-top: var(--space-16);
      padding-top: var(--space-16);
    }

    .links-header {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-12);
      cursor: pointer;
      user-select: none;
    }

    .links-header:hover {
      opacity: 0.8;
    }

    .links-header__label {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 9px;
      font-weight: 500;
      line-height: 100%;
      letter-spacing: 0.09px;
      color: var(--input-field-text-color);
      padding: 3px 0;
    }

    .links-header__chevron {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      color: var(--input-field-text-color);
      transition: transform 0.2s ease;
    }

    .links-header__chevron svg {
      width: 12px;
      height: 12px;
    }

    /* Collapsed state */
    .links-subsection.collapsed .links-header__chevron {
      transform: rotate(-90deg);
    }

    .links-subsection.collapsed .links-list {
      display: none;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-16);
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--background-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-size: var(--body-sm-size);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      max-width: 100%;
      overflow: hidden;
    }

    .link-chip:hover {
      background: var(--background-subtle);
      border-color: var(--border-dark);
    }

    .link-chip__text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-chip__remove {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 10px;
      line-height: 1;
    }

    .link-chip__remove:hover {
      background: var(--border);
      color: var(--foreground);
    }

    .link-add-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: transparent;
      border: 1px dashed var(--border-dark);
      border-radius: var(--radius-xs);
      font-size: var(--body-sm-size);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .link-add-btn:hover {
      background: var(--background-muted);
      border-color: var(--primary);
      color: var(--primary);
    }

    .link-add-btn svg {
      width: 12px;
      height: 12px;
    }

    /* Link icon as InputField label (horizontal variant) */
    .InputField__label.link-icon {
      width: 24px;
      height: 24px;
      min-width: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: var(--radius-xs);
      padding: 0;
    }

    .InputField__label.link-icon svg {
      width: 14px;
      height: 14px;
    }

    .InputField__label.link-icon.figma {
      background: #FFF0ED;
      color: #F24E1E;
    }

    .InputField__label.link-icon.jira {
      background: #E9F2FF;
      color: #2684FF;
    }

    .InputField__label.link-icon.miro {
      background: #FFF8E1;
      color: #FFD02F;
    }
  </style>
</head>
<body>
  <div class="app" id="container">
    <form id="exp-form" autocomplete="off" class="form-container">
      <!-- Header Section -->
      <section class="section-header">
        <div class="header-content">
          <h1>Create experiment</h1>
          <p class="body-md">Group design variants and streamline your growth experiments.</p>
        </div>
        <div class="header-inputs">
          <!-- InputField Component: Vertical variant, default state -->
          <div class="InputField" data-state="default" data-variant="vertical">
            <label class="InputField__label">Experiment name</label>
            <div class="InputField__wrapper">
              <span class="InputField__prefix hidden">(CR)</span>
              <input class="InputField__input" type="text" id="experimentName" placeholder="Untitled experiment">
              <span class="InputField__suffix hidden"></span>
              <span class="InputField__icon hidden">
                <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
          </div>

          <!-- InputField Component: Vertical variant, default state -->
          <div class="InputField" data-state="default" data-variant="vertical">
            <label class="InputField__label">Description</label>
            <div class="InputField__wrapper">
              <span class="InputField__prefix hidden"></span>
              <input class="InputField__input" type="text" id="experimentDescription" placeholder="Add description">
              <span class="InputField__suffix hidden"></span>
              <span class="InputField__icon hidden"></span>
            </div>
          </div>
        </div>

        <!-- Links subsection -->
        <div class="links-subsection" id="linksSubsection">
          <div class="links-header" id="linksHeader">
            <span class="links-header__chevron">
              <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="links-header__label">Links</span>
          </div>
          <div class="links-list" id="linksList">
            <!-- Figma Link - InputField Component: Horizontal variant with icon -->
            <div class="InputField horizontal" data-state="default" data-variant="horizontal">
              <label class="InputField__label link-icon figma" aria-label="Figma">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8 24C10.208 24 12 22.208 12 20V16H8C5.792 16 4 17.792 4 20C4 22.208 5.792 24 8 24Z"/>
                  <path d="M4 12C4 9.792 5.792 8 8 8H12V16H8C5.792 16 4 14.208 4 12Z"/>
                  <path d="M4 4C4 1.792 5.792 0 8 0H12V8H8C5.792 8 4 6.208 4 4Z"/>
                  <path d="M12 0H16C18.208 0 20 1.792 20 4C20 6.208 18.208 8 16 8H12V0Z"/>
                  <path d="M20 12C20 14.208 18.208 16 16 16C13.792 16 12 14.208 12 12C12 9.792 13.792 8 16 8C18.208 8 20 9.792 20 12Z"/>
                </svg>
              </label>
              <div class="InputField__wrapper">
                <span class="InputField__prefix hidden"></span>
                <input class="InputField__input" type="url" id="figmaLink" placeholder="Paste Figma link...">
                <span class="InputField__suffix hidden"></span>
                <span class="InputField__icon hidden"></span>
              </div>
            </div>

            <!-- Jira Link - InputField Component: Horizontal variant with icon -->
            <div class="InputField horizontal" data-state="default" data-variant="horizontal">
              <label class="InputField__label link-icon jira" aria-label="Jira">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M11.571 11.513H0C0 5.171 5.171 0 11.514 0H23.028L11.571 11.513Z"/>
                  <path d="M23.028 0L11.571 11.514L23.028 23.028H11.514C5.171 23.028 0 17.857 0 11.514H11.571L23.028 0Z" opacity="0.5"/>
                </svg>
              </label>
              <div class="InputField__wrapper">
                <span class="InputField__prefix hidden"></span>
                <input class="InputField__input" type="url" id="jiraLink" placeholder="Paste Jira ticket link...">
                <span class="InputField__suffix hidden"></span>
                <span class="InputField__icon hidden"></span>
              </div>
            </div>

            <!-- Miro Link - InputField Component: Horizontal variant with icon -->
            <div class="InputField horizontal" data-state="default" data-variant="horizontal">
              <label class="InputField__label link-icon miro" aria-label="Miro">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17.392 0H13.9L17 4.8L10.1 0H6.608L10.5 6.4L3 0H0L7 12L0 24H3L10.5 17.6L6.608 24H10.1L17 19.2L13.9 24H17.392L24 12L17.392 0Z"/>
                </svg>
              </label>
              <div class="InputField__wrapper">
                <span class="InputField__prefix hidden"></span>
                <input class="InputField__input" type="url" id="miroLink" placeholder="Paste Miro board link...">
                <span class="InputField__suffix hidden"></span>
                <span class="InputField__icon hidden"></span>
              </div>
            </div>
          </div>
        </div>
      </section>
    
      <!-- Metrics Section -->
      <section class="section-metrics">
        <div class="metrics-header">
          <div class="metrics-header-left">
            <h2>Metrics</h2>
            <span class="metrics-count" id="metricsCount"></span>
          </div>
          <button class="btn-add-metric" type="button" aria-label="Add metric" title="Add a new metric">+</button>
        </div>
        <div class="metrics-list" id="metricsList">
          <!-- Metric rows inserted by JS -->
        </div>
        <!-- Empty state placeholder -->
        <div class="metrics-empty-state" id="metricsEmptyState">
          <p>No metrics yet. Click the + button to add your first metric.</p>
        </div>
      </section>

      <!-- Flow Section (Events + Variants) -->
      <section class="section-events">
        <div class="events-header">
          <div class="events-header-left">
            <h2>Flow</h2>
            <span class="events-count" id="eventsCount">0 events • 0 variants</span>
          </div>
          <button class="btn-add-event" type="button" aria-label="Add event" title="Add a new event">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="events-list" id="eventsList">
          <!-- Event rows inserted by JS -->
        </div>
        <!-- Empty state placeholder -->
        <div class="events-empty-state" id="eventsEmptyState">
          <p>No events yet. Click the + button to add your first event.</p>
        </div>
      </section>

      <!-- Footer Section -->
      <footer class="section-footer">
        <button type="submit" class="Button primary">Create flow</button>
        <button type="button" id="cancel" class="Button secondary">Cancel</button>
      </footer>
    </form>
  </div>

  <script>
    /**
     * InputField Component Factory
     * Creates an input field component with all Figma props and variants
     * 
     * @param {Object} props - Component properties
     * @param {string} props.id - Input element ID
     * @param {string} props.label - Label text (default: "Label")
     * @param {boolean} props.showLabel - Show/hide label (default: true)
     * @param {boolean} props.showRText - Show right suffix text (default: false)
     * @param {boolean} props.showRIcon - Show dropdown icon (default: false)
     * @param {boolean} props.showLText - Show left prefix text (default: false)
     * @param {string} props.smallText - Prefix text like "(CR)" (default: "(CR)")
     * @param {string} props.help - Placeholder text (default: "Enter input")
     * @param {string} props.text - Input value (default: "")
     * @param {string} props.suffix - Suffix text (default: "")
     * @param {string} props.state - "default" or "entered" (default: "default")
     * @param {string} props.variant - "vertical" or "horizontal" (default: "vertical")
     * @param {Function} props.onChange - Change handler
     * @returns {HTMLElement} The InputField container element
     */
    function createInputField(props = {}) {
      const {
        id = 'input-' + Math.random().toString(36).substr(2, 9),
        label = 'Label',
        showLabel = true,
        showRText = false,
        showRIcon = false,
        showLText = false,
        smallText = '(CR)',
        help = 'Enter input',
        text = '',
        suffix = '',
        state = 'default',
        variant = 'vertical',
        onChange = null
      } = props;

      // Create container
      const container = document.createElement('div');
      container.className = `InputField ${variant}`;
      container.dataset.state = state;
      container.dataset.variant = variant;
      if (text) container.classList.add('entered');

      // Create label
      const labelEl = document.createElement('label');
      labelEl.className = `InputField__label${showLabel ? '' : ' hidden'}`;
      labelEl.textContent = label;
      labelEl.htmlFor = id;

      // Create wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'InputField__wrapper';

      // Create prefix
      const prefix = document.createElement('span');
      prefix.className = `InputField__prefix${showLText ? '' : ' hidden'}`;
      prefix.textContent = smallText;

      // Create input
      const input = document.createElement('input');
      input.className = 'InputField__input';
      input.type = 'text';
      input.id = id;
      input.placeholder = help;
      input.value = text;

      // Create suffix
      const suffixEl = document.createElement('span');
      suffixEl.className = `InputField__suffix${showRText ? '' : ' hidden'}`;
      suffixEl.textContent = suffix;

      // Create icon
      const icon = document.createElement('span');
      icon.className = `InputField__icon${showRIcon ? '' : ' hidden'}`;
      icon.innerHTML = `<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;

      // Handle state changes
      input.addEventListener('input', (e) => {
        if (e.target.value) {
          container.classList.add('entered');
          container.dataset.state = 'entered';
        } else {
          container.classList.remove('entered');
          container.dataset.state = 'default';
        }
        if (onChange) onChange(e.target.value);
      });

      // Assemble
      wrapper.appendChild(prefix);
      wrapper.appendChild(input);
      wrapper.appendChild(suffixEl);
      wrapper.appendChild(icon);
      container.appendChild(labelEl);
      container.appendChild(wrapper);

      return container;
    }

    // Initialize existing InputFields to handle state changes
    document.querySelectorAll('.InputField').forEach(field => {
      const input = field.querySelector('.InputField__input');
      if (input) {
        // Set initial state based on value
        if (input.value) {
          field.classList.add('entered');
          field.dataset.state = 'entered';
        }
        
        // Handle input changes
        input.addEventListener('input', (e) => {
          if (e.target.value) {
            field.classList.add('entered');
            field.dataset.state = 'entered';
          } else {
            field.classList.remove('entered');
            field.dataset.state = 'default';
          }
        });
      }
    });

    // Sample data for metrics (matching Figma design)
    const defaultMetrics = [
      { id: 'metric-0', name: 'Click through rate', abbreviation: 'CTR', min: 0.695, max: 0.925 },
      { id: 'metric-1', name: 'Conversion rate', abbreviation: 'CR', min: 0.695, max: 0.925 },
    ];

    // Variant badge colors
    const variantColors = ['variant-a', 'variant-b', 'variant-c', 'variant-d'];
    const variantLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

    // Sample data for events with variants
    const defaultEvents = [
      {
        id: 'event-0',
        name: 'Landing page',
        hasVariants: true,
        variants: [
          { id: 'var-0-0', name: 'Control', traffic: 50, metrics: { ctr: 0.695, cr: 0.425 }, isWinner: false },
          { id: 'var-0-1', name: 'Variation A', traffic: 50, metrics: { ctr: 0.725, cr: 0.480 }, isWinner: true },
        ]
      },
      {
        id: 'event-1',
        name: 'Conversion button',
        hasVariants: false,
        variants: []
      },
    ];

    /**
     * Creates a metric row matching the Figma design
     * Layout: [Metric name input (with abbreviation)] [Min] [-] [Max] [Delete]
     */
    function createMetricRow(metric, index) {
      const row = document.createElement('div');
      row.className = 'metric-row';
      row.id = metric.id || `metric-${index}`;

      // Metric name input field (flex: 1)
      const nameFieldDiv = document.createElement('div');
      nameFieldDiv.className = 'metric-name-field';
      const nameField = createInputField({
        id: `metric-name-${index}`,
        label: 'Metric',
        showLabel: true,
        showRText: true,
        suffix: metric.abbreviation || '',
        help: 'Enter metric name',
        text: metric.name || '',
        variant: 'vertical'
      });
      nameFieldDiv.appendChild(nameField);

      // Min/Max range container
      const rangeContainer = document.createElement('div');
      rangeContainer.className = 'metric-range-container';

      // Min field
      const minFieldDiv = document.createElement('div');
      minFieldDiv.className = 'metric-range-field';
      const minField = createInputField({
        id: `metric-min-${index}`,
        label: 'Min',
        showLabel: true,
        help: '0.00',
        text: metric.min !== undefined ? String(metric.min) : '',
        variant: 'vertical'
      });
      minFieldDiv.appendChild(minField);

      // Separator (-)
      const separator = document.createElement('div');
      separator.className = 'metric-range-separator';
      separator.innerHTML = '<span>-</span>';

      // Max field
      const maxFieldDiv = document.createElement('div');
      maxFieldDiv.className = 'metric-range-field';
      const maxField = createInputField({
        id: `metric-max-${index}`,
        label: 'Max',
        showLabel: true,
        help: '1.00',
        text: metric.max !== undefined ? String(metric.max) : '',
        variant: 'vertical'
      });
      maxFieldDiv.appendChild(maxField);

      rangeContainer.appendChild(minFieldDiv);
      rangeContainer.appendChild(separator);
      rangeContainer.appendChild(maxFieldDiv);

      // Delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'metric-delete-btn';
      deleteBtn.type = 'button';
      deleteBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6"/>
        <path d="M14 11v6"/>
      </svg>`;
      deleteBtn.title = 'Delete metric';
      deleteBtn.onclick = (e) => {
        e.preventDefault();
        metrics.splice(metrics.indexOf(metric), 1);
        renderMetrics(metrics);
      };

      // Assemble row
      row.appendChild(nameFieldDiv);
      row.appendChild(rangeContainer);
      row.appendChild(deleteBtn);

      // Store references for data sync
      const nameInput = nameField.querySelector('.InputField__input');
      const minInput = minField.querySelector('.InputField__input');
      const maxInput = maxField.querySelector('.InputField__input');
      const suffixEl = nameField.querySelector('.InputField__suffix');

      // Sync inputs to metric data
      const syncData = () => {
        metric.name = nameInput.value.trim();
        metric.min = parseFloat(minInput.value) || '';
        metric.max = parseFloat(maxInput.value) || '';
        // Auto-generate abbreviation from name
        if (metric.name && !metric.abbreviation) {
          const words = metric.name.split(' ');
          metric.abbreviation = words.map(w => w[0]).join('').toUpperCase();
          suffixEl.textContent = metric.abbreviation;
          suffixEl.classList.remove('hidden');
        }
        updateMetricsCount();
      };

      nameInput.addEventListener('change', syncData);
      minInput.addEventListener('change', syncData);
      maxInput.addEventListener('change', syncData);

      return row;
    }

    function updateMetricsCount() {
      const countEl = document.getElementById('metricsCount');
      const count = metrics.filter(m => m.name).length;
      countEl.textContent = count > 0 ? `${count} metric${count !== 1 ? 's' : ''}` : '';
    }

    function renderMetrics(metrics) {
      const list = document.getElementById('metricsList');
      const emptyState = document.getElementById('metricsEmptyState');
      list.innerHTML = '';

      if (!metrics || metrics.length === 0) {
        emptyState.classList.remove('hidden');
        list.style.display = 'none';
        updateMetricsCount();
        return;
      }

      emptyState.classList.add('hidden');
      list.style.display = 'flex';

      metrics.forEach((m, i) => {
        const row = createMetricRow(m, i);
        list.appendChild(row);
      });

      updateMetricsCount();
    }

    /**
     * Creates a variant card with all inputs
     */
    function createVariantCard(variant, variantIndex, eventIndex) {
      const card = document.createElement('div');
      card.className = 'variant-card';
      card.id = variant.id;

      // Variant badge (A, B, C...)
      const badge = document.createElement('div');
      badge.className = `variant-badge ${variantColors[variantIndex % variantColors.length]}`;
      badge.textContent = variantLetters[variantIndex];

      // Grip handle
      const grip = document.createElement('div');
      grip.className = 'variant-grip';
      grip.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/>
        <circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/>
        <circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/>
      </svg>`;

      // Content area
      const content = document.createElement('div');
      content.className = 'variant-content';

      // Row 1: Variant name + Traffic split
      const row1 = document.createElement('div');
      row1.className = 'variant-row';

      const nameFieldDiv = document.createElement('div');
      nameFieldDiv.className = 'variant-name-field';
      const nameField = createInputField({
        id: `variant-name-${eventIndex}-${variantIndex}`,
        label: 'Variant name',
        showLabel: true,
        help: 'Enter variant name',
        text: variant.name || '',
        variant: 'vertical'
      });
      nameFieldDiv.appendChild(nameField);

      const trafficFieldDiv = document.createElement('div');
      trafficFieldDiv.className = 'variant-traffic-field';
      const trafficField = createInputField({
        id: `variant-traffic-${eventIndex}-${variantIndex}`,
        label: 'Traffic',
        showLabel: true,
        showRText: true,
        suffix: '%',
        help: '50',
        text: variant.traffic !== undefined ? String(variant.traffic) : '',
        variant: 'vertical'
      });
      trafficFieldDiv.appendChild(trafficField);

      row1.appendChild(nameFieldDiv);
      row1.appendChild(trafficFieldDiv);

      // Row 2: Metrics inputs + Set as winner
      const row2 = document.createElement('div');
      row2.className = 'variant-metrics-row';

      // CTR metric field
      const ctrFieldDiv = document.createElement('div');
      ctrFieldDiv.className = 'variant-metric-field';
      const ctrField = createInputField({
        id: `variant-ctr-${eventIndex}-${variantIndex}`,
        label: 'CTR',
        showLabel: true,
        help: '0.00',
        text: variant.metrics?.ctr !== undefined ? String(variant.metrics.ctr) : '',
        variant: 'vertical'
      });
      ctrFieldDiv.appendChild(ctrField);

      // CR metric field
      const crFieldDiv = document.createElement('div');
      crFieldDiv.className = 'variant-metric-field';
      const crField = createInputField({
        id: `variant-cr-${eventIndex}-${variantIndex}`,
        label: 'CR',
        showLabel: true,
        help: '0.00',
        text: variant.metrics?.cr !== undefined ? String(variant.metrics.cr) : '',
        variant: 'vertical'
      });
      crFieldDiv.appendChild(crField);

      // Set as winner button
      const winnerBtn = document.createElement('button');
      winnerBtn.type = 'button';
      winnerBtn.className = `btn-set-winner${variant.isWinner ? ' is-winner' : ''}`;
      winnerBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
      <span>${variant.isWinner ? 'Winner' : 'Set as winner'}</span>`;
      winnerBtn.title = variant.isWinner ? 'Current winner' : 'Set as winner';
      winnerBtn.onclick = () => {
        // Toggle winner status, unset others
        events[eventIndex].variants.forEach((v, i) => {
          v.isWinner = (i === variantIndex) ? !v.isWinner : false;
        });
        renderEvents(events);
      };

      row2.appendChild(ctrFieldDiv);
      row2.appendChild(crFieldDiv);
      row2.appendChild(winnerBtn);

      content.appendChild(row1);
      content.appendChild(row2);

      // Actions (remove variant)
      const actions = document.createElement('div');
      actions.className = 'variant-actions';

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'variant-action-btn remove';
      removeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>`;
      removeBtn.title = 'Remove variant';
      removeBtn.onclick = () => {
        events[eventIndex].variants.splice(variantIndex, 1);
        if (events[eventIndex].variants.length === 0) {
          events[eventIndex].hasVariants = false;
        }
        renderEvents(events);
      };

      actions.appendChild(removeBtn);

      // Assemble card
      card.appendChild(badge);
      card.appendChild(grip);
      card.appendChild(content);
      card.appendChild(actions);

      return card;
    }

    /**
     * Creates an event row with optional variants
     */
    function createEventRow(event, eventIndex, totalEvents) {
      const row = document.createElement('div');
      row.className = 'event-row';
      row.id = event.id;

      // Main row (step badge + input + actions)
      const mainRow = document.createElement('div');
      mainRow.className = 'event-row-main';

      // Step indicator with flow line
      const stepDiv = document.createElement('div');
      stepDiv.className = 'event-step';
      
      const stepBadge = document.createElement('div');
      stepBadge.className = 'event-step-badge';
      stepBadge.textContent = String(eventIndex + 1);
      stepDiv.appendChild(stepBadge);

      // Flow line (if not last event or has variants)
      if (eventIndex < totalEvents - 1 || event.hasVariants) {
        const flowLine = document.createElement('div');
        flowLine.className = 'event-flow-line';
        stepDiv.appendChild(flowLine);
      }

      // Event name input
      const inputContainer = document.createElement('div');
      inputContainer.className = 'event-input-container';
      const eventInput = createInputField({
        id: `event-name-${eventIndex}`,
        label: 'Event',
        showLabel: false,
        help: 'Event name',
        text: event.name || '',
        variant: 'horizontal'
      });
      inputContainer.appendChild(eventInput);

      // Actions (sync + delete)
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'event-actions';

      // Sync button (experiment icon)
      const syncBtn = document.createElement('button');
      syncBtn.type = 'button';
      syncBtn.className = 'event-action-btn';
      syncBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h3"/>
        <path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/>
        <path d="M12 20v-8"/>
        <path d="m9 17 3 3 3-3"/>
        <path d="M12 4v4"/>
      </svg>`;
      syncBtn.title = 'Sync with Figma';

      // Delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'event-action-btn delete';
      deleteBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
      </svg>`;
      deleteBtn.title = 'Delete event';
      deleteBtn.onclick = () => {
        events.splice(eventIndex, 1);
        renderEvents(events);
      };

      actionsDiv.appendChild(syncBtn);
      actionsDiv.appendChild(deleteBtn);

      mainRow.appendChild(stepDiv);
      mainRow.appendChild(inputContainer);
      mainRow.appendChild(actionsDiv);
      row.appendChild(mainRow);

      // Variants container (if this event has variants)
      if (event.hasVariants || event.variants?.length > 0) {
        const variantsContainer = document.createElement('div');
        variantsContainer.className = 'event-variants-container';

        const variantsLine = document.createElement('div');
        variantsLine.className = 'event-variants-line';

        const variantsList = document.createElement('div');
        variantsList.className = 'variants-list';

        // Render each variant card
        event.variants.forEach((variant, vIndex) => {
          const variantCard = createVariantCard(variant, vIndex, eventIndex);
          variantsList.appendChild(variantCard);
        });

        variantsContainer.appendChild(variantsLine);
        variantsContainer.appendChild(variantsList);
        row.appendChild(variantsContainer);
      }

      // Sync input to event data
      const nameInput = eventInput.querySelector('.InputField__input');
      nameInput.addEventListener('change', () => {
        event.name = nameInput.value.trim();
        updateEventsCount();
      });

      return row;
    }

    /**
     * Updates the events count display
     */
    function updateEventsCount() {
      const countEl = document.getElementById('eventsCount');
      const eventCount = events.filter(e => e.name).length;
      const variantCount = events.reduce((sum, e) => sum + (e.variants?.length || 0), 0);
      countEl.textContent = `${eventCount} event${eventCount !== 1 ? 's' : ''} • ${variantCount} variant${variantCount !== 1 ? 's' : ''}`;
    }

    /**
     * Renders the complete events/flow section
     */
    function renderEvents(eventsList) {
      const list = document.getElementById('eventsList');
      const emptyState = document.getElementById('eventsEmptyState');
      list.innerHTML = '';

      if (!eventsList || eventsList.length === 0) {
        emptyState.classList.remove('hidden');
        list.style.display = 'none';
        updateEventsCount();
        return;
      }

      emptyState.classList.add('hidden');
      list.style.display = 'flex';

      eventsList.forEach((event, index) => {
        const eventRow = createEventRow(event, index, eventsList.length);
        list.appendChild(eventRow);
      });

      updateEventsCount();
    }

    let metrics = JSON.parse(JSON.stringify(defaultMetrics));
    let events = JSON.parse(JSON.stringify(defaultEvents));

    renderMetrics(metrics);
    renderEvents(events);

    document.getElementById('exp-form').onsubmit = (e) => {
      e.preventDefault();
      const experimentName = document.getElementById('experimentName').value.trim();
      const experimentDescription = document.getElementById('experimentDescription').value.trim();
      const figmaLink = document.getElementById('figmaLink').value.trim();
      const jiraLink = document.getElementById('jiraLink').value.trim();
      const miroLink = document.getElementById('miroLink').value.trim();

      // Collect filled metrics only
      const filledMetrics = metrics
        .filter(m => m.name)
        .map(m => ({ 
          name: m.name, 
          abbreviation: m.abbreviation,
          min: m.min,
          max: m.max
        }));

      parent.postMessage({ pluginMessage: {
        type: 'create-flow',
        payload: {
          experimentName,
          experimentDescription,
          figmaLink,
          jiraLink,
          miroLink,
          metrics: filledMetrics,
          events: JSON.parse(JSON.stringify(events))
        }
      } }, '*');
    };

    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    document.querySelector('.btn-add-metric').onclick = (e) => {
      e.preventDefault();
      metrics.push({ 
        id: `metric-${Date.now()}`,
        name: '',
        abbreviation: '',
        min: '',
        max: ''
      });
      renderMetrics(metrics);
    };

    document.querySelector('.btn-add-event').onclick = (e) => {
      e.preventDefault();
      events.push({
        id: `event-${Date.now()}`,
        name: '',
        hasVariants: false,
        variants: []
      });
      renderEvents(events);
    };

    // Links section expand/collapse
    document.getElementById('linksHeader').onclick = () => {
      const subsection = document.getElementById('linksSubsection');
      subsection.classList.toggle('collapsed');
    };
  </script>
</body>
</html>
