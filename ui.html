
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<style>
html {
  font-size: 14px; /* 1rem = 14px instead of 16px */
}
/* Force Figtree font everywhere */
body, input, button, select, textarea, table, th, td, label, h1, h2, h3, h4, h5, h6, .app {
  font-family: "Figtree", system-ui, Arial, sans-serif;
  font-optical-sizing: auto;
  font-style: normal;
}
@font-face {
  font-family: 'Figtree';
  src: url('./fonts/Figtree-Regular.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Figtree';
  src: url('./fonts/Figtree-Medium.woff2') format('woff2');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Figtree';
  src: url('./fonts/Figtree-Semibold.woff2') format('woff2');
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Figtree';
  src: url('./fonts/Figtree-Bold.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
/* Ensure the main container fills the iframe */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Figtree', system-ui, sans-serif;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow-y: auto;
}

.app {
  min-height: 100%;
  width: 450px;
  padding: 24px;
  box-sizing: border-box;
  background: #FFFFFF;
}
/* Section heading spacing */
h2 {
  margin-top: 0;
  margin-bottom: 20px;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: -0.5px;
}
form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.row {
  display: flex;
  gap: 12px;
  align-items: center;
}
/* Add vertical spacing between rows in flow-setup */
.flow-setup .row {
  margin-bottom: 16px;
}
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
}
.variants-section {
  margin-bottom: 28px;
  padding-bottom: 0;
}
.actions-footer {
  position: sticky;
  bottom: 0;
  background: #fff;
  box-shadow: 0 -2px 12px 0 rgba(40,60,90,0.04);
  padding: 20px 24px 16px 24px;
  margin-left: -24px;
  margin-right: -24px;
  z-index: 10;
}
.actions {
  display: flex;
  gap: 16px;
  margin-top: 0;
}
.pill.winner {
  background: #ffe9b3;
  color: #a67c00;
  border: 1px solid #ffe08a;
}
.pill.running {
  background: #d1f5e0;
  color: #217a4d;
  border: 1px solid #a6e7c3;
}
.pill.none {
  background: #eee;
  color: #888;
  border: 1px solid #ddd;
}
.metrics-chip {
  display: inline-block;
  background: #eaf0fa;
  color: #2a4d7a;
  border-radius: 8px;
  padding: 2px 10px 2px 10px;
  font-size: 0.93em;
  font-weight: 500;
  margin-right: 4px;
  border: none;
  box-shadow: none;
  pointer-events: none;
  user-select: text;
}
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
input[type="text"], input[type="number"] {
  font-size: 1rem;
  padding: 4px 7px;
  border: 1px solid #ccc;
  border-radius: 5px;
  width: 100%;
  box-sizing: border-box;
}
input[type="number"] {
  max-width: 70px;
}
button {
  font-size: 1rem;
  padding: 6px 16px;
  border-radius: 6px;
  border: none;
  background: #2a4d7a;
  color: #fff;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
label, select {
  font-size: 1rem;
}
button:active {
  background: #18304d;
}
button.secondary {
  background: #e0e7ef;
  color: #2a4d7a;
  border: 1px solid #b5c7de;
}
/* --- Section layout for refactor --- */
.flow-setup {
  padding-bottom: 12px;
}
.variants-section {
  padding-bottom: 0;
  font-weight: 600;
  font-size: 1em;
}
.variant-cards-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 8px;
}
.variant-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #f7fafd;
  border: 1px solid #e6eaf2;
  border-radius: 16px;
  padding: 16px 16px 16px 16px;
  box-shadow: 0 2px 8px 0 rgba(40,60,90,0.04);
  position: relative;
  font-family: "Figtree", system-ui, Arial, sans-serif;
}
.variant-card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 2px;
}
.variant-key-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #2a4d7a;
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  margin-right: 0;
  flex-shrink: 0;
}
.variant-title-group {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.variant-name-input {
  font-size: 1.08rem;
  font-weight: 600;
  border: none;
  background: transparent;
  padding: 0 0 2px 0;
  min-width: 120px;
  flex: 1 1 120px;
  outline: none;
  color: #1a2330;
}
.variant-traffic-input {
  width: 54px;
  font-size: 1.08rem;
  font-weight: 600;
  color: #217a4d;
  background: #eaf7f0;
  border: 1.5px solid #b6e2c6;
  border-radius: 7px;
  padding: 2px 8px;
  margin-left: 6px;
  margin-right: 2px;
  text-align: right;
}
.variant-status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 2px;
}
.variant-status-select {
  min-width: 90px;
  font-size: 0.98rem;
  padding: 2px 8px;
  border-radius: 6px;
  border: 1px solid #dbe3ef;
  background: #fff;
}
.variant-status-pill {
  font-size: 0.85em;
  padding: 1px 10px;
  border-radius: 10px;
  margin-left: 0;
  opacity: 0.6;
  font-weight: 500;
  background: #e0e7ef;
  color: #2a4d7a;
  border: 1px solid #e0e7ef;
  pointer-events: none;
  box-shadow: none;
  cursor: default;
  transition: none;
  user-select: text;
}
.variant-key-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #2a4d7a;
  color: #fff;
  font-weight: 700;
  font-size: 1.1rem;
  margin-right: 4px;
  flex-shrink: 0;
}
.variant-fields {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 16px;
  align-items: center;
  flex: 1;
}
.variant-name-input {
  min-width: 120px;
  flex: 1 1 120px;
}
.variant-status-select {
  min-width: 90px;
}
.variant-traffic-input {
  width: 60px;
}
.variant-metrics {
  display: flex;
  gap: 8px;
  margin-left: 8px;
  transition: opacity 0.15s;
}
.variant-metrics.hidden {
  display: none !important;
}
.actions-footer {
  position: sticky;
  bottom: 0;
  background: #fff;
  box-shadow: 0 -2px 12px 0 rgba(40,60,90,0.04);
  padding: 20px 24px 16px 24px;
  margin-left: -24px;
  margin-right: -24px;
  z-index: 10;
}
.integration-input {
  font-size: 1rem;
  padding: 4px 7px;
  border: 1px solid #ccc;
  border-radius: 5px;
  width: 100%;
  box-sizing: border-box;
}
</style>
<div class="app" id="container">
  <h2>Growthlab Flow Builder</h2>
  <form id="exp-form" autocomplete="off">
    <!-- Flow setup section -->
    <section class="flow-setup">
      <div class="row">
        <label style="min-width:110px;">Name</label>
        <input type="text" id="experimentName" required placeholder="e.g. Button Color Test">
      </div>
      <div class="row">
        <label style="min-width:110px;">Description</label>
        <input type="text" id="experimentDescription" placeholder="Short description (optional)">
      </div>
      <div class="row">
        <label style="min-width:110px;">Round</label>
        <input type="number" id="roundNumber" min="1" value="1" required>
      </div>
      <div class="row">
        <label style="min-width:110px;">Entry node</label>
        <input type="text" id="entryLabel" value="Login" required>
      </div>
      <div class="row">
        <label style="min-width:110px;">Exit node</label>
        <input type="text" id="exitLabel" value="Welcome" required>
      </div>
      <div class="row">
        <label style="min-width:110px;">Figma link</label>
        <input type="url" id="figmaLink" class="integration-input" placeholder="https://www.figma.com/file/...">
      </div>
      <div class="row">
        <label style="min-width:110px;">Jira link</label>
        <input type="url" id="jiraLink" class="integration-input" placeholder="https://jira.company.com/browse/...">
      </div>
      <div class="row">
        <label style="min-width:110px;">Miro link</label>
        <input type="url" id="miroLink" class="integration-input" placeholder="https://miro.com/app/board/...">
      
      </div>
    </section>
    <!-- Variants section -->
    <section class="variants-section">
      <label>Variants</label>
      <div class="variant-cards-list" id="variantsCardsList">
        <!-- Cards inserted by JS -->
      </div>
    </section>
    <!-- Sticky action footer -->
    <footer class="actions-footer">
      <div class="actions">
        <button type="submit">Create flow</button>
        <!-- <button class="secondary" type="button" id="createFromSelection">Create from selection</button> -->
        <button class="secondary" type="button" id="cancel">Cancel</button>
      </div>
    </footer>
  </form>
</div>

<script>
const defaultVariants = [
  { key: 'A', name: 'Black btn', traffic: 50, status: 'Running', metrics: { CTR: 0, CR: 0, SU: 0 } },
  { key: 'B', name: 'Blue btn', traffic: 25, status: 'Winner', metrics: { CTR: 1, CR: 1, SU: 31 } },
  { key: 'C', name: 'Green btn', traffic: 25, status: 'None', metrics: { CTR: 0, CR: 0, SU: 0 } },
];

const statusOptions = [
  { value: 'Running', label: 'Running', class: 'running' },
  { value: 'Winner', label: 'Winner', class: 'winner' },
  { value: 'None', label: 'None', class: 'none' },
];

function renderVariants(variants) {
  const list = document.getElementById('variantsCardsList');
  list.innerHTML = '';
  variants.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'variant-card';
    // Determine if metrics should be shown
    const hasMetrics = v.metrics.CTR || v.metrics.CR || v.metrics.SU;
    card.innerHTML = `
      <div class="variant-card-header">
        <span class="variant-key-badge">${v.key}</span>
        <div class="variant-title-group">
          <input type="text" class="variant-name-input" value="${v.name}" placeholder="Variant name" data-idx="${i}" data-field="name">
          <input type="number" class="variant-traffic-input" value="${v.traffic}" min="0" max="100" data-idx="${i}" data-field="traffic">%
        </div>
      </div>
      <div class="variant-status-row">
        <select class="variant-status-select" data-idx="${i}" data-field="status">
          ${statusOptions.map(opt => `<option value="${opt.value}" ${v.status===opt.value?'selected':''}>${opt.label}</option>`).join('')}
        </select>
        <span class="variant-status-pill ${v.status.toLowerCase()}" style="pointer-events:none;">${v.status}</span>
      </div>
      <div class="variant-metrics${hasMetrics ? '' : ' hidden'}" tabindex="0">
        <span class="metrics-chip">CTR: ${v.metrics.CTR || 0}</span>
        <span class="metrics-chip">CR: ${v.metrics.CR || 0}</span>
        <span class="metrics-chip">SU: ${v.metrics.SU || 0}</span>
      </div>
    `;
    // Reveal metrics on focus
    const metricsDiv = card.querySelector('.variant-metrics');
    if (metricsDiv) {
      card.addEventListener('focusin', () => {
        metricsDiv.classList.remove('hidden');
      });
      card.addEventListener('focusout', () => {
        if (!(v.metrics.CTR || v.metrics.CR || v.metrics.SU)) {
          metricsDiv.classList.add('hidden');
        }
      });
    }
    list.appendChild(card);
  });
}

let variants = JSON.parse(JSON.stringify(defaultVariants));
renderVariants(variants);

// Listen for changes in the variants table
document.getElementById('variantsCardsList').addEventListener('input', (e) => {
  const idx = +e.target.getAttribute('data-idx');
  const field = e.target.getAttribute('data-field');
  if (['name', 'traffic'].includes(field)) {
    variants[idx][field] = field === 'traffic' ? Number(e.target.value) : e.target.value;
  } else if (['CTR', 'CR', 'SU'].includes(field)) {
    variants[idx].metrics[field] = Number(e.target.value);
  }
  renderVariants(variants);
});
document.getElementById('variantsCardsList').addEventListener('change', (e) => {
  const idx = +e.target.getAttribute('data-idx');
  const field = e.target.getAttribute('data-field');
  if (field === 'status') {
    variants[idx][field] = e.target.value;
    renderVariants(variants); // re-render to update pill
  }
});

// Form submit
document.getElementById('exp-form').onsubmit = (e) => {
  e.preventDefault();
  const experimentName = document.getElementById('experimentName').value.trim();
  const experimentDescription = document.getElementById('experimentDescription').value.trim();
  const roundNumber = Number(document.getElementById('roundNumber').value);
  const entryLabel = document.getElementById('entryLabel').value.trim();
  const exitLabel = document.getElementById('exitLabel').value.trim();
  const figmaLink = document.getElementById('figmaLink').value.trim();
  const jiraLink = document.getElementById('jiraLink').value.trim();
  const miroLink = document.getElementById('miroLink').value.trim();
  parent.postMessage({ pluginMessage: {
    type: 'create-flow',
    payload: {
      experimentName,
      experimentDescription,
      roundNumber,
      entryLabel,
      exitLabel,
      figmaLink,
      jiraLink,
      miroLink,
      variants: JSON.parse(JSON.stringify(variants))
    }
  } }, '*');
};

const createFromSelectionBtn = document.getElementById('createFromSelection');
if (createFromSelectionBtn) {
  createFromSelectionBtn.onclick = () => {
    parent.postMessage({ pluginMessage: { type: 'create-from-selection' } }, '*');
  };
}

document.getElementById('cancel').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
};
</script>
