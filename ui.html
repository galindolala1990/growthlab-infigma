
<style>
/* Ensure the main container fills the iframe */
#container {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: stretch;
}
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 24px 20px 20px 20px;
  background: #fff;
  color: #222;
  width: 100vw;
  height: 100vh;
  min-width: 0;
  min-height: 0;
  max-width: 100vw;
  max-height: 100vh;
  box-sizing: border-box;
  overflow: auto;
}
h2 {
  margin-top: 0;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: -0.5px;
}
form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.row {
  display: flex;
  gap: 12px;
  align-items: center;
}
.variants-table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 4px;
}
.variants-table th, .variants-table td {
  padding: 4px 6px;
  text-align: left;
  font-size: 0.97em;
}
.variants-table th {
  font-weight: 500;
  color: #666;
  background: #f6f6f6;
}
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.92em;
  font-weight: 500;
  background: #e0e7ef;
  color: #2a4d7a;
  margin-right: 2px;
}
.pill.winner {
  background: #ffe9b3;
  color: #a67c00;
  border: 1px solid #ffe08a;
}
.pill.running {
  background: #d1f5e0;
  color: #217a4d;
  border: 1px solid #a6e7c3;
}
.pill.none {
  background: #eee;
  color: #888;
  border: 1px solid #ddd;
}
.metrics-chip {
  display: inline-block;
  background: #f3f6fa;
  color: #3a4a5a;
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 0.91em;
  margin-right: 2px;
}
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
input[type="text"], input[type="number"] {
  font-size: 1em;
  padding: 4px 7px;
  border: 1px solid #ccc;
  border-radius: 5px;
  width: 100%;
  box-sizing: border-box;
}
input[type="number"] {
  max-width: 70px;
}
button {
  font-size: 1em;
  padding: 6px 16px;
  border-radius: 6px;
  border: none;
  background: #2a4d7a;
  color: #fff;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
button:active {
  background: #18304d;
}
button.secondary {
  background: #e0e7ef;
  color: #2a4d7a;
  border: 1px solid #b5c7de;
}
</style>
<div id="container">
  <h2>Experiment Flow Builder</h2>
  <form id="exp-form" autocomplete="off">
  <div class="row">
    <label style="min-width:110px;">Experiment name</label>
    <input type="text" id="experimentName" required placeholder="e.g. Button Color Test">
  </div>
  <div class="row">
    <label style="min-width:110px;">Round number</label>
    <input type="number" id="roundNumber" min="1" value="1" required>
  </div>
  <div class="row">
    <label style="min-width:110px;">Entry node label</label>
    <input type="text" id="entryLabel" value="Login" required>
  </div>
  <div class="row">
    <label style="min-width:110px;">Exit node label</label>
    <input type="text" id="exitLabel" value="Welcome" required>
  </div>
  <div>
    <label>Variants</label>
    <table class="variants-table" id="variantsTable">
      <thead>
        <tr>
          <th style="width:32px;">Key</th>
          <th>Name</th>
          <th style="width:60px;">Traffic %</th>
          <th style="width:80px;">Status</th>
          <th colspan="3">Metrics</th>
        </tr>
        <tr>
          <th></th><th></th><th></th><th></th>
          <th style="width:48px;">CTR</th>
          <th style="width:48px;">CR</th>
          <th style="width:48px;">SU</th>
        </tr>
      </thead>
      <tbody id="variantsBody">
        <!-- Rows inserted by JS -->
      </tbody>
    </table>
  </div>
  <div class="actions">

    <button type="submit">Create flow</button>
    <button type="button" id="createFromSelection" class="secondary">Create from selection</button>
    <button type="button" id="cancel" class="secondary">Cancel</button>
  </div>
  </form>
</div>

<script>
const defaultVariants = [
  { key: 'A', name: 'Black btn', traffic: 50, status: 'Running', metrics: { CTR: 0, CR: 0, SU: 0 } },
  { key: 'B', name: 'Blue btn', traffic: 25, status: 'Winner', metrics: { CTR: 1, CR: 1, SU: 31 } },
  { key: 'C', name: 'Green btn', traffic: 25, status: 'None', metrics: { CTR: 0, CR: 0, SU: 0 } },
];

const statusOptions = [
  { value: 'Running', label: 'Running', class: 'running' },
  { value: 'Winner', label: 'Winner', class: 'winner' },
  { value: 'None', label: 'None', class: 'none' },
];

function renderVariants(variants) {
  const tbody = document.getElementById('variantsBody');
  tbody.innerHTML = '';
  variants.forEach((v, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${v.key}" maxlength="1" style="width:28px;" data-idx="${i}" data-field="key"></td>
      <td><input type="text" value="${v.name}" placeholder="Variant name" data-idx="${i}" data-field="name"></td>
      <td><input type="number" value="${v.traffic}" min="0" max="100" data-idx="${i}" data-field="traffic"></td>
      <td>
        <select data-idx="${i}" data-field="status">
          ${statusOptions.map(opt => `<option value="${opt.value}" ${v.status===opt.value?'selected':''}>${opt.label}</option>`).join('')}
        </select>
        <span class="pill ${v.status.toLowerCase()}">${v.status}</span>
      </td>
      <td><input type="number" value="${v.metrics.CTR}" step="0.1" data-idx="${i}" data-field="CTR"></td>
      <td><input type="number" value="${v.metrics.CR}" step="0.1" data-idx="${i}" data-field="CR"></td>
      <td><input type="number" value="${v.metrics.SU}" step="0.1" data-idx="${i}" data-field="SU"></td>
    `;
    tbody.appendChild(tr);
  });
}

let variants = JSON.parse(JSON.stringify(defaultVariants));
renderVariants(variants);

// Listen for changes in the variants table
document.getElementById('variantsBody').addEventListener('input', (e) => {
  const idx = +e.target.getAttribute('data-idx');
  const field = e.target.getAttribute('data-field');
  if (['key', 'name', 'traffic'].includes(field)) {
    variants[idx][field] = field === 'traffic' ? Number(e.target.value) : e.target.value;
  } else if (['CTR', 'CR', 'SU'].includes(field)) {
    variants[idx].metrics[field] = Number(e.target.value);
  }
});
document.getElementById('variantsBody').addEventListener('change', (e) => {
  const idx = +e.target.getAttribute('data-idx');
  const field = e.target.getAttribute('data-field');
  if (field === 'status') {
    variants[idx][field] = e.target.value;
    renderVariants(variants); // re-render to update pill
  }
});

// Form submit
document.getElementById('exp-form').onsubmit = (e) => {
  e.preventDefault();
  const experimentName = document.getElementById('experimentName').value.trim();
  const roundNumber = Number(document.getElementById('roundNumber').value);
  const entryLabel = document.getElementById('entryLabel').value.trim();
  const exitLabel = document.getElementById('exitLabel').value.trim();
  parent.postMessage({ pluginMessage: {
    type: 'create-flow',
    payload: {
      experimentName,
      roundNumber,
      entryLabel,
      exitLabel,
      variants: JSON.parse(JSON.stringify(variants))
    }
  } }, '*');
};

document.getElementById('createFromSelection').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'create-from-selection' } }, '*');
};

document.getElementById('cancel').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
};
</script>
