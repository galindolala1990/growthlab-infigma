<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 
     * DESIGN TOKENS (inlined for Figma plugin sandbox compatibility)
     */
    :root {
      /* === Typography System (from Figma) === */
      --heading-h1-size: 12px;
      --heading-h1-weight: 600;
      --heading-h1-line-height: 100%;
      --heading-h2-size: 11px;
      --heading-h2-weight: 500;
      --heading-h2-line-height: 91%;
      --body-md-size: 11px;
      --body-md-weight: 400;
      --body-md-line-height: 130%;
      --body-lg-size: 12px;
      --body-lg-weight: 400;
      --body-lg-line-height: 120%;
      --body-sm-size: 10px;
      --body-sm-weight: 400;
      --body-sm-line-height: 130%;
      --label-size: 9px;
      --label-weight: 500;
      --label-line-height: 100%;
      --input-text-size: 11px;
      --input-text-weight: 400;
      --input-text-line-height: 91%;

      /* === Colors === */
      --primary: #6F4CFF;
      --primary-foreground: #FFFFFF;
      --primary-hover: #5F3DE6;
      --primary-active: #4C2FCC;
      --primary-soft: #F0EBFF;
      --background: #FFFFFF;
      --background-subtle: #F9FAFB;
      --background-surface: #FFFFFF;
      --background-muted: #ECEFF2;
      --foreground: #0F1729;
      --text-secondary: #333B47;
      --text-muted: #3F4C5F;
      --text-subtle: #D1D5DB;
      --border: #EDEDF1;
      --border-dark: #D8DBDF;
      --accent-success: #126930;
      --accent-success-bg: #eaf7f0;
      --accent-primary-dark: #18305a;
      --typography-h1-color: #18305a;
      --typography-h2-color: #18305a;
      --typography-meta-color: #4a5a70;

      /* === Spacing === */
      --space-4: 4px;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-24: 24px;

      /* === Border Radius === */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --radius-xl: 18px;

      /* === Component Variables === */
      --section-padding: 16px;
      --section-gap: 16px;
      --section-radius: 18px;
      --section-shadow: 0 4px 16px 0 rgba(40,60,90,0.06);
      --input-bg: #FFFFFF;
      --input-border: 1px solid #dbe3ef;
      --input-radius: 4px;
      --input-padding-x: 9px;
      --input-padding-y: 7px;
      --input-height: 40px;
      --button-padding: 6px;
      --button-radius: 4px;
      --button-gap: 4px;
      --container-gap: 4px;
      --variant-card-bg: #ECEFF2;
      --variant-card-border: #EDEDF1;
      --variant-card-shadow: 0 2px 8px 0 rgba(40,60,90,0.06);
      --variant-traffic-bg: #eaf7f0;
      --variant-traffic-border: #b6e2c6;
      --variant-traffic-color: #126930;
    }

    /* 
     * FIGMA PLUGIN TYPOGRAPHY
     */
    
    /* Reset & Base Typography */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    /* Heading 1 */
    h1 {
      font-size: var(--heading-h1-size);
      font-weight: var(--heading-h1-weight);
      line-height: var(--heading-h1-line-height);
      color: var(--typography-h1-color);
      letter-spacing: -0.01em;
    }
    
    /* Heading 2 */
    h2 {
      font-size: var(--heading-h2-size);
      font-weight: var(--heading-h2-weight);
      line-height: var(--heading-h2-line-height);
      color: var(--typography-h2-color);
      letter-spacing: -0.005em;
    }
    
    /* Body Medium (default) */
    p, .body-md {
      font-size: var(--body-md-size);
      font-weight: var(--body-md-weight);
      line-height: var(--body-md-line-height);
      color: var(--text-secondary);
    }
    
    /* Body Large */
    .body-lg {
      font-size: var(--body-lg-size);
      font-weight: var(--body-lg-weight);
      line-height: var(--body-lg-line-height);
      color: var(--text-secondary);
    }
    
    /* Body Small */
    .body-sm {
      font-size: var(--body-sm-size);
      font-weight: var(--body-sm-weight);
      line-height: var(--body-sm-line-height);
      color: var(--text-muted);
    }
    
    /* Form Elements */
    input, button, select, textarea {
      font-size: var(--body-md-size);
    }

    /* App Container */
    .app {
      background: var(--background-subtle);
      min-height: 100vh;
      padding: var(--space-16);
    }

    /* Section Header (from Figma: padding=16px, spacing=16px) */
    .section-header {
      background: var(--background-surface);
      border: 1px solid var(--border);
      border-radius: var(--section-radius);
      padding: var(--section-padding);
      margin-bottom: var(--section-gap);
      box-shadow: var(--section-shadow);
    }

    .header-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      margin-bottom: var(--space-16);
    }

    .header-inputs {
      display: flex;
      flex-direction: column;
      gap: var(--space-12);
    }

    /* Form Inputs */
    .Input {
      background: var(--input-bg);
      border: var(--input-border);
      border-radius: var(--input-radius);
      height: var(--input-height);
      padding: var(--input-padding-y) var(--input-padding-x);
      color: var(--foreground);
      font-size: var(--input-text-size);
      font-weight: var(--input-text-weight);
      line-height: var(--input-text-line-height);
    }

    .Input::placeholder {
      color: var(--text-subtle);
    }

    .Input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }

    /* Form Container (from Figma: spacing=4px) */
    .form-container {
      display: flex;
      flex-direction: column;
      gap: var(--container-gap);
    }

    /* Section Metrics & Events */
    .section-metrics,
    .section-events {
      background: var(--background-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-16);
      box-shadow: var(--variant-card-shadow);
    }

    .metrics-header,
    .events-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-12);
    }

    .events-count {
      font-size: var(--body-sm-size);
      color: var(--typography-meta-color);
    }

    /* Add Metric Button (from Figma: radius=4px) */
    .btn-add-metric {
      width: 24px;
      height: 24px;
      border-radius: var(--button-radius);
      border: 1px solid var(--border);
      background: var(--background-surface);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-add-metric:hover {
      background: var(--background-muted);
      border-color: var(--border-dark);
    }

    /* Metric Cards */
    .metrics-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .metric-card {
      background: var(--variant-card-bg);
      border: 1px solid var(--variant-card-border);
      border-radius: var(--radius-sm);
      padding: var(--space-12);
    }

    .metric-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .metric-name {
      font-size: var(--body-md-size);
      font-weight: 500;
      color: var(--foreground);
    }

    .metric-rate {
      font-size: var(--body-sm-size);
      font-weight: 600;
      color: var(--accent-success);
    }

    /* Events List */
    .events-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .event-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-8) var(--space-12);
      background: var(--background-muted);
      border-radius: var(--radius-xs);
    }

    .event-row-variant {
      background: var(--variant-traffic-bg);
      border: 1px solid var(--variant-traffic-border);
    }

    .event-name {
      font-size: var(--body-md-size);
      color: var(--foreground);
    }

    .event-variants {
      font-size: var(--body-sm-size);
      font-weight: 600;
      color: var(--variant-traffic-color);
    }

    /* Footer Section */
    .section-footer {
      display: flex;
      gap: var(--space-12);
      padding-top: var(--space-8);
    }

    /* Buttons */
    /* Buttons (from Figma: padding=6px, radius=4px, gap=4px) */
    .Button {
      height: var(--input-height);
      padding: var(--button-padding) var(--space-24);
      border-radius: var(--button-radius);
      font-size: var(--body-md-size);
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--button-gap);
      transition: background 0.15s, box-shadow 0.15s;
    }

    .Button.primary {
      background: var(--primary);
      color: var(--primary-foreground);
    }

    .Button.primary:hover {
      background: var(--primary-hover);
    }

    .Button.primary:active {
      background: var(--primary-active);
    }

    .Button.secondary {
      background: var(--background-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .Button.secondary:hover {
      background: var(--background-muted);
      border-color: var(--border-dark);
    }
  </style>
</head>
<body>
  <div class="app" id="container">
    <!-- Header Section -->
    <section class="section-header">
      <div class="header-content">
        <h1>Create experiment</h1>
        <p class="body-md">Design, configure, and launch experiment flows visually. Group variants, link context, and streamline your growth experiments.</p>
      </div>
      <div class="header-inputs">
        <input class="Input" type="text" id="experimentName" placeholder="Untitled experiment">
        <input class="Input" type="text" id="experimentDescription" placeholder="Add description">
      </div>
    </section>

    <form id="exp-form" autocomplete="off" class="form-container">
      <!-- Metrics Section -->
      <section class="section-metrics">
        <div class="metrics-header">
          <h2>Metrics</h2>
          <button class="btn-add-metric" type="button" aria-label="Add metric">+</button>
        </div>
        <div class="metrics-list" id="metricsList">
          <!-- Metric cards inserted by JS -->
        </div>
      </section>

      <!-- Events Section -->
      <section class="section-events">
        <div class="events-header">
          <h2>Events</h2>
          <span class="events-count" id="eventsCount">3 events • 3 variants</span>
        </div>
        <div class="events-list" id="eventsList">
          <!-- Event rows inserted by JS -->
        </div>
      </section>

      <!-- Footer Section -->
      <footer class="section-footer">
        <button type="submit" class="Button primary">Create flow</button>
        <button type="button" id="cancel" class="Button secondary">Cancel</button>
      </footer>
    </form>
  </div>

  <script>
    // Sample data for metrics
    const defaultMetrics = [
      { name: 'CTR', status: 'add button', value: 0 },
      { name: 'CR', status: 'filled name and rate', value: 2.5 },
      { name: 'Conversion rate', status: 'filled name and rate', value: 18 },
    ];

    // Sample data for events
    const defaultEvents = [
      { type: 'event', name: 'Page viewed', variants: null },
      { type: 'variant', name: 'Checkout', variants: 3 },
      { type: 'event', name: 'Order placed', variants: null },
    ];

    function renderMetrics(metrics) {
      const list = document.getElementById('metricsList');
      list.innerHTML = '';
      metrics.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = 'metric-card';
        
        const header = document.createElement('div');
        header.className = 'metric-header';
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'metric-name';
        nameSpan.textContent = m.name;
        
        const rateSpan = document.createElement('span');
        rateSpan.className = 'metric-rate';
        rateSpan.textContent = m.value + '%';
        
        header.appendChild(nameSpan);
        header.appendChild(rateSpan);
        card.appendChild(header);
        list.appendChild(card);
      });
    }

    function renderEvents(events) {
      const list = document.getElementById('eventsList');
      const summary = document.getElementById('eventsCount');
      list.innerHTML = '';
      
      const eventCount = events.filter(e => e.type === 'event').length;
      const variantCount = events.filter(e => e.type === 'variant').length;
      summary.textContent = `${eventCount} events • ${variantCount} variants`;
      
      events.forEach((e, i) => {
        const row = document.createElement('div');
        row.className = `event-row event-row-${e.type}`;
        
        const nameDiv = document.createElement('div');
        nameDiv.className = 'event-name';
        nameDiv.textContent = e.name;
        row.appendChild(nameDiv);
        
        if (e.variants) {
          const variantsDiv = document.createElement('div');
          variantsDiv.className = 'event-variants';
          variantsDiv.textContent = e.variants;
          row.appendChild(variantsDiv);
        }
        
        list.appendChild(row);
      });
    }

    let metrics = JSON.parse(JSON.stringify(defaultMetrics));
    let events = JSON.parse(JSON.stringify(defaultEvents));

    renderMetrics(metrics);
    renderEvents(events);

    document.getElementById('exp-form').onsubmit = (e) => {
      e.preventDefault();
      const experimentName = document.getElementById('experimentName').value.trim();
      const experimentDescription = document.getElementById('experimentDescription').value.trim();
      parent.postMessage({ pluginMessage: {
        type: 'create-flow',
        payload: {
          experimentName,
          experimentDescription,
          metrics: JSON.parse(JSON.stringify(metrics)),
          events: JSON.parse(JSON.stringify(events))
        }
      } }, '*');
    };

    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    document.querySelector('.btn-add-metric').onclick = (e) => {
      e.preventDefault();
      metrics.push({ name: 'New metric', status: 'add button', value: 0 });
      renderMetrics(metrics);
    };
  </script>
</body>
</html>
