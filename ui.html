    function getBrandIcon(name, options = {}) {
      const {
        size = 24,
        className = ''
      } = options;
      
      const iconData = brandIcons[name];
      if (!iconData) {
        // Fall back to generic link icon
        const genericIcon = brandIcons['generic'];
        return `<svg class="brand-icon brand-icon-generic${className ? ' ' + className : ''}" viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${genericIcon}</svg>`;
      }
      
      // Handle multi-color icons (like Figma)
      if (iconData.multicolor) {
        const paths = iconData.paths.map(p => `<path d="${p.d}" fill="${p.fill}"/>`).join('');
        return `<svg class="brand-icon brand-icon-${name}${className ? ' ' + className : ''}" viewBox="0 0 24 24" width="${size}" height="${size}" fill="none">${paths}</svg>`;
      }
      
      // Handle generic icon (uses stroke)
      if (name === 'generic') {
        return `<svg class="brand-icon brand-icon-generic${className ? ' ' + className : ''}" viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconData}</svg>`;
      }
      
      // Handle single-color icons
      return `<svg class="brand-icon brand-icon-${name}${className ? ' ' + className : ''}" viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor">${iconData}</svg>`;
    }

    /**
     * Get a Lucide icon SVG string
     * @param {string} name - Icon name (e.g., 'plus', 'trash-2')
     * @param {Object} options - Optional overrides for SVG attributes
     * @returns {string} Complete SVG markup
     */
    function getIcon(name, options = {}) {
      const {
        size = 24,
        strokeWidth = 2,
        className = ''
      } = options;
      
      const iconPath = lucideIcons[name];
      if (!iconPath) {
        console.warn(`Lucide icon "${name}" not found`);
        return '';
      }
      
      return `<svg class="lucide lucide-${name}${className ? ' ' + className : ''}" viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg>`;
    }

    /**
     * InputField Component Factory
     * Creates an input field component with all Figma props and variants
     * 
     * @param {Object} props - Component properties
     * @param {string} props.id - Input element ID
     * @param {string} props.label - Label text (default: "Label")
     * @param {boolean} props.showLabel - Show/hide label (default: true)
     * @param {boolean} props.showRText - Show right suffix text (default: false)
     * @param {boolean} props.showRIcon - Show dropdown icon (default: false)
     * @param {boolean} props.showLText - Show left prefix text (default: false)
     * @param {boolean} props.showLIcon - Show left brand icon (default: false)
     * @param {string} props.leftIcon - Brand icon name: 'figma', 'miro', 'jira' (default: '')
     * @param {string} props.smallText - Prefix text like "(CR)" (default: "(CR)")
     * @param {string} props.help - Placeholder text (default: "Enter input")
     * @param {string} props.text - Input value (default: "")
     * @param {string} props.suffix - Suffix text (default: "")
     * @param {string} props.state - "default" or "entered" (default: "default")
     * @param {string} props.variant - "vertical" or "horizontal" (default: "vertical")
     * @param {boolean} props.multiline - Use textarea instead of input (default: false)
     * @param {number} props.rows - Number of rows for textarea (default: 1)
     * @param {HTMLElement} props.prefixElement - Custom prefix element (e.g., color indicator)
     * @param {Function} props.onChange - Change handler
     * @param {string} props.inputType - Input type: 'text', 'url', etc. (default: 'text')
     * @returns {HTMLElement} The InputField container element
     */
    function createInputField(props = {}) {
      const {
        id = 'input-' + Math.random().toString(36).substr(2, 9),
        label = 'Label',
        showLabel = true,
        showRText = false,
        showRIcon = false,
        showLText = false,
        showLIcon = false,
        leftIcon = '',
        smallText = 'CTR',
        help = 'Enter input',
        text = '',
        suffix = '',
        state = 'default',
        variant = 'vertical',
        multiline = false,
        rows = 1,
        prefixElement = null,
        onChange = null,
        inputType = 'text'
      } = props;

      // Create container
      const container = document.createElement('div');
      container.className = `InputField ${variant}`;
      if (multiline) container.classList.add('multiline');
      container.dataset.state = state;
      container.dataset.variant = variant;
      if (text) container.classList.add('entered');

      // Create label
      const labelEl = document.createElement('label');
      labelEl.className = `InputField__label${showLabel ? '' : ' hidden'}`;
      labelEl.textContent = label;
      labelEl.htmlFor = id;

      // Create wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'InputField__wrapper';

      // Create left icon (Lucide or brand icons)
      if (showLIcon && leftIcon) {
        const iconEl = document.createElement('span');
        iconEl.className = `InputField__left-icon ${leftIcon}`;
        // Use Lucide icon if available, else fallback to brand icon
        if (lucideIcons[leftIcon]) {
          iconEl.innerHTML = getIcon(leftIcon, { size: 14 });
        } else {
          iconEl.innerHTML = getBrandIcon(leftIcon, { size: 14 });
        }
        wrapper.appendChild(iconEl);
      }

      // Create prefix (text or custom element)
      if (prefixElement) {
        wrapper.appendChild(prefixElement);
      } else if (showLText) {
        const prefix = document.createElement('span');
        prefix.className = 'InputField__prefix';
        prefix.textContent = smallText;
        wrapper.appendChild(prefix);
      }

      // Create input or textarea
      let inputEl;
      if (multiline) {
        inputEl = document.createElement('textarea');
        inputEl.className = 'InputField__input InputField__textarea';
        inputEl.rows = rows;
        inputEl.style.resize = 'none';
      } else {
        inputEl = document.createElement('input');
        inputEl.className = 'InputField__input';
        inputEl.type = inputType;
      }
      inputEl.id = id;
      inputEl.placeholder = help;
      inputEl.value = text;

      // Create suffix
      const suffixEl = document.createElement('span');
      suffixEl.className = `InputField__suffix${showRText ? '' : ' hidden'}`;
      suffixEl.textContent = suffix;

      // Create icon (Lucide: chevron-down)
      const icon = document.createElement('span');
      icon.className = `InputField__icon${showRIcon ? '' : ' hidden'}`;
      icon.innerHTML = getIcon('chevron-down');

      // Handle state changes
      inputEl.addEventListener('input', (e) => {
        if (e.target.value) {
          container.classList.add('entered');
          container.dataset.state = 'entered';
        } else {
          container.classList.remove('entered');
          container.dataset.state = 'default';
        }
        // Auto-resize textarea
        if (multiline) {
          e.target.style.height = 'auto';
          e.target.style.height = e.target.scrollHeight + 'px';
        }
        if (onChange) onChange(e.target.value);
      });

      // Assemble
      wrapper.appendChild(inputEl);
      wrapper.appendChild(suffixEl);
      wrapper.appendChild(icon);
      container.appendChild(labelEl);
      container.appendChild(wrapper);

      return container;
    }

    // Initialize existing InputFields to handle state changes
    document.querySelectorAll('.InputField').forEach(field => {
      const input = field.querySelector('.InputField__input');
      if (input) {
        // Set initial state based on value
        if (input.value) {
          field.classList.add('entered');
          field.dataset.state = 'entered';
        }
        
        // Handle input changes
        input.addEventListener('input', (e) => {
          if (e.target.value) {
            field.classList.add('entered');
            field.classList.add('entered');
            field.dataset.state = 'entered';
          } else {
            field.classList.remove('entered');
            field.dataset.state = 'default';
          }
        });
      }
    });

    /**
     * SelectField Component
     * Creates a styled dropdown/select element following the design system.
     * 
     * @param {Object} props - Component properties
     * @param {string} props.id - Unique identifier for the select element
     * @param {string} props.label - Label text (default: "Label")
     * @param {boolean} props.showLabel - Whether to show the label (default: true)
     * @param {boolean} props.required - Whether the field is required (default: false)
     * @param {string} props.placeholder - Placeholder option text (default: "Select...")
     * @param {boolean} props.showPlaceholder - Whether to show placeholder option (default: true)
     * @param {Array<{value: string, label: string, disabled?: boolean}>} props.options - Select options
     * @param {string} props.value - Currently selected value (default: "")
     * @param {string} props.size - Size variant: "sm" | "md" | "lg" (default: "md")
     * @param {string} props.variant - Layout variant: "vertical" | "horizontal" (default: "vertical")
     * @param {boolean} props.disabled - Whether select is disabled (default: false)
     * @param {boolean} props.error - Whether to show error state (default: false)
     * @param {string} props.helperText - Helper or error text below the select
     * @param {Function} props.onChange - Change handler function
     * @returns {HTMLElement} The SelectField container element
     * 
     * @example
     * // Basic usage
     * const select = createSelectField({
     *   id: 'status',
     *   label: 'Status',
     *   options: [
     *     { value: 'running', label: 'Running' },
     *     { value: 'paused', label: 'Paused' }
     *   ],
     *   onChange: (value) => console.log('Selected:', value)
     * });
     * 
     * @example
     * // With all props
     * const select = createSelectField({
     *   id: 'priority',
     *   label: 'Priority',
     *   showLabel: true,
     *   required: true,
     *   placeholder: 'Select priority...',
     *   options: [
     *     { value: 'high', label: 'High' },
     *     { value: 'medium', label: 'Medium' },
     *     { value: 'low', label: 'Low', disabled: true }
     *   ],
     *   value: 'medium',
     *   size: 'md',
     *   variant: 'vertical',
     *   disabled: false,
     *   error: false,
     *   helperText: 'Select the task priority',
     *   onChange: (value) => handleChange(value)
     * });
     */
    function createSelectField(props = {}) {
      const {
        id = 'select-' + Math.random().toString(36).substr(2, 9),
        label = 'Label',
        showLabel = true,
        required = false,
        placeholder = 'Select...',
        showPlaceholder = true,
        options = [],
        value = '',
        size = 'md',
        variant = 'vertical',
        disabled = false,
        error = false,
        helperText = '',
        onChange = null
      } = props;

      // Create container with variant and size classes
      const container = document.createElement('div');
      container.className = 'SelectField';
      if (variant === 'horizontal') container.classList.add('horizontal');
      if (size !== 'md') container.classList.add(size);
      if (disabled) container.classList.add('disabled');
      if (error) container.classList.add('error');
      container.dataset.size = size;
      container.dataset.variant = variant;

      // Create label
      const labelEl = document.createElement('label');
      labelEl.className = 'SelectField__label';
      if (!showLabel) labelEl.classList.add('hidden');
      if (required) labelEl.classList.add('required');
      labelEl.textContent = label;
      labelEl.htmlFor = id;

      // Create wrapper (for positioning icon)
      const wrapper = document.createElement('div');
      wrapper.className = 'SelectField__wrapper';

      // Create select element
      const selectEl = document.createElement('select');
      selectEl.className = 'SelectField__select';
      selectEl.id = id;
      selectEl.disabled = disabled;
      if (required) selectEl.required = true;

      // Add placeholder option if showPlaceholder is true
      if (showPlaceholder) {
        const placeholderOption = document.createElement('option');
        placeholderOption.value = '';
        placeholderOption.textContent = placeholder;
        placeholderOption.disabled = true;
        // Select placeholder if no value is set
        if (!value) placeholderOption.selected = true;
        selectEl.appendChild(placeholderOption);
      }

      // Add options
      options.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.value;
        option.textContent = opt.label;
        if (opt.disabled) option.disabled = true;
        if (opt.value === value) option.selected = true;
        selectEl.appendChild(option);
      });

      // Create icon (Lucide: chevron-down)
      const icon = document.createElement('span');
      icon.className = 'SelectField__icon';
      icon.innerHTML = getIcon('chevron-down');

      // Create helper text element
      const helperEl = document.createElement('span');
      helperEl.className = 'SelectField__helper';
      if (!helperText) helperEl.classList.add('hidden');
      helperEl.textContent = helperText;

      // Handle change events
      selectEl.addEventListener('change', (e) => {
        const newValue = e.target.value;
        if (onChange) onChange(newValue, e);
      });

      // Assemble component
      wrapper.appendChild(selectEl);
      wrapper.appendChild(icon);
      container.appendChild(labelEl);
      container.appendChild(wrapper);
      if (helperText) container.appendChild(helperEl);

      // Add helper methods to the container element
      container.getValue = () => selectEl.value;
      container.setValue = (newValue) => {
        selectEl.value = newValue;
        selectEl.dispatchEvent(new Event('change'));
      };
      container.setOptions = (newOptions, keepValue = true) => {
        const currentValue = keepValue ? selectEl.value : '';
        // Clear all but placeholder
        while (selectEl.options.length > (showPlaceholder ? 1 : 0)) {
          selectEl.remove(selectEl.options.length - 1);
        }
        // Add new options
        newOptions.forEach(opt => {
          const option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt.label;
          if (opt.disabled) option.disabled = true;
          if (opt.value === currentValue) option.selected = true;
          selectEl.appendChild(option);
        });
      };
      container.setDisabled = (isDisabled) => {
        selectEl.disabled = isDisabled;
        container.classList.toggle('disabled', isDisabled);
      };
      container.setError = (hasError, message = '') => {
        container.classList.toggle('error', hasError);
        helperEl.textContent = message;
        helperEl.classList.toggle('hidden', !message);
      };
      container.getSelectElement = () => selectEl;

      return container;
    }

    // Initialize existing SelectFields to ensure consistent behavior
    document.querySelectorAll('.SelectField').forEach(field => {
      const select = field.querySelector('.SelectField__select');
      if (select) {
        // Add size class based on height if not already set
        if (!field.classList.contains('sm') && !field.classList.contains('lg')) {
          // Default to md
          field.dataset.size = 'md';
        }
        
        // Add variant class if horizontal layout detected
        if (!field.classList.contains('horizontal') && !field.classList.contains('vertical')) {
          field.dataset.variant = 'vertical';

    // Sample data for metrics (matching Figma design)
    const defaultMetrics = [

    ];

    // Variant badge colors
    const variantColors = ['variant-blue', 'variant-green', 'variant-orange', 'variant-purple', 'variant-pink', 'variant-teal'];
    const variantLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

    const colorPalette = [

    /**
     * Creates a metric row matching the Figma design
     * Layout: [Metric name input (with abbreviation)] [Min] [-] [Max] [Delete]
     * Only the first row shows labels to save vertical space
     */
    function createMetricRow(metric, index) {
      const row = document.createElement('div');
      row.className = 'metric-row';
      row.id = metric.id || `metric-${index}`;

      // Show labels only for the first metric row (index 0)
      const isFirstRow = index === 0;

      // Metric name input field (flex: 1)
      const nameFieldDiv = document.createElement('div');
      nameFieldDiv.className = 'metric-name-field';
      const nameField = createInputField({
        id: `metric-name-${index}`,
        label: 'Name',
        showLabel: isFirstRow,
        showLText: true,
        smallText: metric.abbreviation || 'CTR',
        help: 'e.g., Click through rate',
        text: metric.name || '',
        variant: 'vertical'
      });
      nameFieldDiv.appendChild(nameField);

      // Min/Max range container
      const rangeContainer = document.createElement('div');
      rangeContainer.className = 'metric-range-container';

      // Min field
      const minFieldDiv = document.createElement('div');
      minFieldDiv.className = 'metric-range-field';
      const minField = createInputField({
        id: `metric-min-${index}`,
        label: 'Min',
        showLabel: isFirstRow,
        help: '0.00',
        text: metric.min !== undefined ? String(metric.min) : '',
        variant: 'vertical'
      });
      minFieldDiv.appendChild(minField);

      // Separator (-)
      const separator = document.createElement('div');
      separator.className = 'metric-range-separator';
      separator.innerHTML = '<span>-</span>';

      // Max field
      const maxFieldDiv = document.createElement('div');
      maxFieldDiv.className = 'metric-range-field';
      const maxField = createInputField({
        id: `metric-max-${index}`,
        label: 'Max',
        showLabel: isFirstRow,
        help: '1.00',
        text: metric.max !== undefined ? String(metric.max) : '',
        variant: 'vertical'
      });
      maxFieldDiv.appendChild(maxField);

      rangeContainer.appendChild(minFieldDiv);
      rangeContainer.appendChild(separator);
      rangeContainer.appendChild(maxFieldDiv);

      // Delete button (Lucide: minus)
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'icon-btn';
      deleteBtn.type = 'button';
      deleteBtn.innerHTML = getIcon('minus');
      deleteBtn.setAttribute('data-tooltip', 'Remove metric');
      deleteBtn.setAttribute('data-tooltip-position', 'bottom');
      deleteBtn.setAttribute('data-tooltip-align', 'end');
      deleteBtn.setAttribute('data-tooltip-cursor', 'pointer');
      deleteBtn.onclick = (e) => {
        e.preventDefault();
        metrics.splice(metrics.indexOf(metric), 1);
        renderMetrics(metrics);
      };

      // Assemble row
      row.appendChild(nameFieldDiv);
      row.appendChild(rangeContainer);
      row.appendChild(deleteBtn);

      // Store references for data sync
      const nameInput = nameField.querySelector('.InputField__input');
      const minInput = minField.querySelector('.InputField__input');
      const maxInput = maxField.querySelector('.InputField__input');
      const prefixEl = nameField.querySelector('.InputField__prefix');

      // Sync inputs to metric data
      const syncData = () => {
        const previousName = metric.name;
        metric.name = nameInput.value.trim();
        metric.min = parseFloat(minInput.value) || '';
        metric.max = parseFloat(maxInput.value) || '';
        // Auto-generate abbreviation from name (max 3 characters)
        if (metric.name && !metric.abbreviation) {
          const words = metric.name.split(' ');
          metric.abbreviation = words.map(w => w[0]).join('').toUpperCase().slice(0, 3);
          prefixEl.textContent = metric.abbreviation;
          prefixEl.classList.remove('hidden');
        }
        // Update abbreviation if name changed (max 3 characters)
        if (metric.name && previousName !== metric.name) {
          const words = metric.name.split(' ');
          metric.abbreviation = words.map(w => w[0]).join('').toUpperCase().slice(0, 3);
          prefixEl.textContent = metric.abbreviation;
          prefixEl.classList.remove('hidden');
        }
        updateMetricsCount();
        // Re-render events to update variant metric fields
        if (typeof events !== 'undefined') {
          renderEvents(events);
        }
      };

      nameInput.addEventListener('change', syncData);
      minInput.addEventListener('change', syncData);
      maxInput.addEventListener('change', syncData);

      return row;
    }

    function updateMetricsCount() {
      const countEl = document.getElementById('metricsCount');
      const count = metrics.filter(m => m.name).length;
      countEl.textContent = count > 0 ? `${count} metric${count !== 1 ? 's' : ''}` : '';
    }

    function renderMetrics(metricsArray, skipEventRender = false) {
      const list = document.getElementById('metricsList');
      const emptyState = document.getElementById('metricsEmptyState');
      list.innerHTML = '';

      if (!metricsArray || metricsArray.length === 0) {
        emptyState.classList.remove('hidden');
        list.style.display = 'none';
        updateMetricsCount();
        // Re-render events to update variant metric fields
        if (!skipEventRender && typeof events !== 'undefined') {
          renderEvents(events);
        }
        return;
      }

      emptyState.classList.add('hidden');
      list.style.display = 'flex';

      metricsArray.forEach((m, i) => {
        const row = createMetricRow(m, i);
        list.appendChild(row);
      });

      updateMetricsCount();
      
      // Re-render events to update variant metric fields when metrics change
      if (!skipEventRender && typeof events !== 'undefined') {
        renderEvents(events);
      }
    }

    /**
     * Creates a color picker popover for variant color selection
     */
    function createColorPopover(currentColor, onSelect) {
      const popover = document.createElement('div');
      popover.className = 'color-popover';
      
      const grid = document.createElement('div');
      grid.className = 'color-popover-grid';
      
      colorPalette.forEach(color => {
        const option = document.createElement('button');
        option.type = 'button';
        option.className = 'color-option';
        if (currentColor === color.hex) {
          option.classList.add('selected');
        }
        option.style.backgroundColor = color.hex;
        option.style.setProperty('--color-option-color', color.hex);
        option.dataset.colorId = color.id;
        option.dataset.colorHex = color.hex;
        option.title = color.id.charAt(0).toUpperCase() + color.id.slice(1);
        
        option.addEventListener('click', (e) => {
          e.stopPropagation();
          // Remove selected from all
          grid.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
          option.classList.add('selected');
          onSelect(color.hex);
          popover.classList.remove('open');
        });
        
        grid.appendChild(option);
      });
      
      popover.appendChild(grid);
      return popover;
    }

    /**

    function createVariantCard(variant, variantIndex, eventIndex) {

        const card = document.createElement('div');

        card.id = variant.id;

        // Get default color based on index if not set
        const defaultColor = colorPalette[variantIndex % colorPalette.length].hex;

        // Variant name field (InputField with color indicator as prefix) - TOP OF CARD

        card.classList.add('dragging');

        e.dataTransfer.setData('text/plain', JSON.stringify({ eventIndex, variantIndex }));
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });

      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      card.addEventListener('drop', (e) => {
        e.preventDefault();
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        const fromEventIndex = data.eventIndex;
        const fromVariantIndex = data.variantIndex;
        const toEventIndex = parseInt(card.dataset.eventIndex);
        const toVariantIndex = parseInt(card.dataset.variantIndex);

        // Only reorder within the same event
        if (fromEventIndex === toEventIndex && fromVariantIndex !== toVariantIndex) {
          const variants = events[fromEventIndex].variants;
          const [movedVariant] = variants.splice(fromVariantIndex, 1);
          variants.splice(toVariantIndex, 0, movedVariant);
          renderEvents(events);
        }
      });

      return card;
    }

    /**
     * Creates an event row with optional variants
     */
    function createEventRow(event, eventIndex, totalEvents) {
      const row = document.createElement('div');
      row.className = 'event-row';

      const stepBadge = document.createElement('div');

        variant: 'horizontal'
      });
      inputContainer.appendChild(eventInput);

      addVariantBtn.className = 'icon-btn';

      addVariantBtn.setAttribute('data-tooltip-cursor', 'pointer');
      addVariantBtn.onclick = () => {

        const defaultColor = colorPalette[variantIndex % colorPalette.length].hex;
        event.variants.push({
          id: `var-${eventIndex}-${variantIndex}`,
          name: '',
          description: '',
          color: defaultColor,
          traffic: '',
          metrics: { ctr: '', cr: '' },

          collapsed: false
        });
        renderEvents(events);
      };

      // Delete button (Lucide: minus)
      const deleteBtn = document.createElement('button');

      deleteBtn.setAttribute('data-tooltip-position', 'bottom');
      deleteBtn.setAttribute('data-tooltip-align', 'end');
      deleteBtn.setAttribute('data-tooltip-cursor', 'pointer');
      deleteBtn.onclick = () => {
        events.splice(eventIndex, 1);
        renderEvents(events);

      actionsDiv.appendChild(addVariantBtn);
      actionsDiv.appendChild(deleteBtn);

      mainRow.appendChild(stepDiv);
      mainRow.appendChild(inputContainer);
      mainRow.appendChild(actionsDiv);
      row.appendChild(mainRow);

      // Variants container (if this event has variants)
      if (event.hasVariants || event.variants?.length > 0) {
        const variantsContainer = document.createElement('div');
        variantsContainer.className = 'event-variants-container';

        // Step indicator for variants (mirrors event-step structure)

    /**
     * Updates the events count display
     */
    function updateEventsCount() {
      const countEl = document.getElementById('eventsCount');
      const eventCount = events.filter(e => e.name).length;
      const variantCount = events.reduce((sum, e) => sum + (e.variants?.length || 0), 0);
      countEl.textContent = `${eventCount} event${eventCount !== 1 ? 's' : ''} • ${variantCount} variant${variantCount !== 1 ? 's' : ''}`;
    }

    /**
     * Renders the complete events/flow section
     */
    function renderEvents(eventsList) {
      const list = document.getElementById('eventsList');
      const emptyState = document.getElementById('eventsEmptyState');
      list.innerHTML = '';

      if (!eventsList || eventsList.length === 0) {
        emptyState.classList.remove('hidden');
        list.style.display = 'none';
        updateEventsCount();
        return;
      }

      emptyState.classList.add('hidden');
      list.style.display = 'flex';

      eventsList.forEach((event, index) => {
        const eventRow = createEventRow(event, index, eventsList.length);
        list.appendChild(eventRow);
      });

      updateEventsCount();
    }

    let metrics = JSON.parse(JSON.stringify(defaultMetrics));
    let events = JSON.parse(JSON.stringify(defaultEvents));

    // Initial render - skip event render from metrics to avoid double render
    renderMetrics(metrics, true);
    renderEvents(events);

    // ============================================
    // RELATED LINKS FUNCTIONALITY
    // Smart link detection with provider auto-detection
    // ============================================

    /**
     * Links state - array of link objects
     * Each link: { id, url, provider, name, domain }
     */
    let relatedLinks = [];

    /**
     * Provider detection patterns
     * Maps domain patterns to provider info
     */
    const providerPatterns = [
      { pattern: /figma\.com/i, provider: 'figma', extractName: (url) => {
        // Try to extract file name or ID from Figma URL
        const match = url.match(/\/(?:file|design|proto|board)\/([a-zA-Z0-9]+)/);
        return match ? match[1] : null;
      }},
      { pattern: /atlassian\.net.*\/browse\//i, provider: 'jira', extractName: (url) => {
        // Extract Jira ticket ID (e.g., GL-123)
        const match = url.match(/\/browse\/([A-Z]+-\d+)/i);
        return match ? match[1] : null;
      }},
      { pattern: /jira\./i, provider: 'jira', extractName: (url) => {
        const match = url.match(/\/browse\/([A-Z]+-\d+)/i);
        return match ? match[1] : null;
      }},
      { pattern: /miro\.com/i, provider: 'miro', extractName: (url) => {
        // Extract Miro board ID
        const match = url.match(/\/board\/([a-zA-Z0-9_=-]+)/);
        return match ? match[1] : null;
      }},
      { pattern: /asana\.com/i, provider: 'asana', extractName: (url) => {
        // Extract Asana task ID
        const match = url.match(/\/(\d+)(?:\/|$)/);
        return match ? `Task ${match[1]}` : null;
      }},
      { pattern: /linear\.app/i, provider: 'linear', extractName: (url) => {
        // Extract Linear issue ID (e.g., ENG-123)
        const match = url.match(/\/issue\/([A-Z]+-\d+)/i);
        return match ? match[1] : null;
      }},
      { pattern: /notion\.so|notion\.site/i, provider: 'notion', extractName: (url) => {
        // Extract page name from URL
        const match = url.match(/\/([^/?]+)(?:\?|$)/);
        if (match) {
          // Clean up the slug (remove ID suffix)
          const slug = match[1].replace(/-[a-f0-9]{32}$/i, '').replace(/-/g, ' ');
          return slug.charAt(0).toUpperCase() + slug.slice(1);
        }
        return null;
      }},
      { pattern: /slack\.com/i, provider: 'slack', extractName: (url) => {
        // Extract channel or message context
        const channelMatch = url.match(/\/archives\/([A-Z0-9]+)/i);
        return channelMatch ? `Channel ${channelMatch[1]}` : null;
      }},
      { pattern: /github\.com/i, provider: 'github', extractName: (url) => {
        // Extract repo or issue/PR info
        const repoMatch = url.match(/github\.com\/([^/]+\/[^/]+)/);
        const issueMatch = url.match(/\/(issues|pull)\/(\d+)/);
        if (issueMatch) {
          return `${issueMatch[1] === 'pull' ? 'PR' : 'Issue'} #${issueMatch[2]}`;
        }
        return repoMatch ? repoMatch[1] : null;
      }},
      { pattern: /atlassian\.net.*\/wiki/i, provider: 'confluence', extractName: (url) => {
        // Extract page title from Confluence URL
        const match = url.match(/\/pages\/\d+\/([^?]+)/);
        if (match) {
          return decodeURIComponent(match[1]).replace(/\+/g, ' ');
        }
        return null;
      }},
      { pattern: /confluence\./i, provider: 'confluence', extractName: (url) => null },
      { pattern: /trello\.com/i, provider: 'trello', extractName: (url) => {
        // Extract card or board name
        const cardMatch = url.match(/\/c\/([a-zA-Z0-9]+)/);
        return cardMatch ? `Card ${cardMatch[1]}` : null;
      }},
      { pattern: /monday\.com/i, provider: 'monday', extractName: (url) => null },
      { pattern: /clickup\.com/i, provider: 'clickup', extractName: (url) => {
        // Extract task ID
        const match = url.match(/\/t\/([a-z0-9]+)/i);
        return match ? `Task ${match[1]}` : null;
      }}
    ];

    /**
     * Detect provider from URL
     * @param {string} url - The URL to analyze
     * @returns {Object} Provider info { provider, name }
     */
    function detectProvider(url) {
      for (const { pattern, provider, extractName } of providerPatterns) {
        if (pattern.test(url)) {
          return {
            provider,
            name: extractName(url)
          };
        }
      }
      return { provider: 'generic', name: null };
    }

    /**
     * Extract domain from URL for display
     * @param {string} url - The URL
     * @returns {string} Domain (e.g., "figma.com")
     */
    function extractDomain(url) {
      try {
        const urlObj = new URL(url);
        return urlObj.hostname.replace(/^www\./, '');
      } catch {
        return '';
      }
    }

    /**
     * Normalize URL
     * - Trim whitespace
     * - Add https:// if missing
     * - Basic validation
     * @param {string} url - Raw URL input
     * @returns {Object} { valid, url, error }
     */
    function normalizeUrl(url) {
      // Trim whitespace
      let normalized = url.trim();
      
      if (!normalized) {
        return { valid: false, url: '', error: 'Please enter a URL' };
      }

      // Add protocol if missing
      if (!/^https?:\/\//i.test(normalized)) {
        // If it looks like a domain, add https
        if (/^[a-z0-9][\w.-]*\.[a-z]{2,}/i.test(normalized)) {
          normalized = 'https://' + normalized;
        } else {
          return { valid: false, url: normalized, error: 'Invalid URL format' };
        }
      }

      // Upgrade http to https where safe
      if (/^http:\/\//i.test(normalized)) {
        // Keep http for localhost, otherwise suggest https
        if (!/localhost|127\.0\.0\.1|192\.168\.|10\./.test(normalized)) {
          normalized = normalized.replace(/^http:/i, 'https:');
        }
      }

      // Validate URL format
      try {
        new URL(normalized);
        return { valid: true, url: normalized, error: null };
      } catch {
        return { valid: false, url: normalized, error: 'Invalid URL format' };
      }
    }

    /**
     * Add a new link
     * @param {string} rawUrl - The URL to add
     * @returns {boolean} Success
     */
    function addLink(rawUrl) {
      const errorEl = document.getElementById('linkInputError');
      const inputEl = document.getElementById('linkInput');
      
      // Normalize and validate
      const { valid, url, error } = normalizeUrl(rawUrl);
      
      if (!valid) {
        errorEl.textContent = error;
        errorEl.style.display = 'block';
        return false;
      }

      // Check for duplicates
      if (relatedLinks.some(link => link.url === url)) {
        errorEl.textContent = 'This link has already been added';
        errorEl.style.display = 'block';
        return false;
      }

      // Detect provider
      const { provider } = detectProvider(url);
      const domain = extractDomain(url);

      // Create link object - use URL as display (stripped of protocol)
      const displayUrl = url.replace(/^https?:\/\//, '');
      const link = {
        id: `link-${Date.now()}`,
        url,
        provider,
        name: displayUrl,
        domain
      };

      relatedLinks.push(link);
      
      // Clear input and error
      inputEl.value = '';
      errorEl.style.display = 'none';
      
      renderLinks();
      return true;
    }

    /**
     * Update an existing link
     * @param {string} id - Link ID
     * @param {string} newUrl - New URL
     * @returns {boolean} Success
     */
    function updateLink(id, newUrl) {
      const { valid, url, error } = normalizeUrl(newUrl);
      
      if (!valid) {
        return { success: false, error };
      }

      // Check for duplicates (excluding current link)
      if (relatedLinks.some(link => link.id !== id && link.url === url)) {
        return { success: false, error: 'This link has already been added' };
      }

      const linkIndex = relatedLinks.findIndex(link => link.id === id);
      if (linkIndex === -1) return { success: false, error: 'Link not found' };

      // Update link - use URL as display (stripped of protocol)
      const { provider } = detectProvider(url);
      const domain = extractDomain(url);
      const displayUrl = url.replace(/^https?:\/\//, '');

      relatedLinks[linkIndex] = {
        ...relatedLinks[linkIndex],
        url,
        provider,
        name: displayUrl,
        domain
      };

      renderLinks();
      return { success: true };
    }

    /**
     * Remove a link
     * @param {string} id - Link ID
     */
    function removeLink(id) {
      relatedLinks = relatedLinks.filter(link => link.id !== id);
      renderLinks();
    }

    /**
     * Enter edit mode for a link
     * @param {string} id - Link ID
     */
    function editLink(id) {
      const linkRow = document.querySelector(`[data-link-id="${id}"]`);
      if (!linkRow) return;

      linkRow.classList.add('editing');
      const input = linkRow.querySelector('.link-row__edit-input');
      if (input) {
        input.focus();
        input.select();
      }
    }

    /**
     * Save edit for a link
     * @param {string} id - Link ID
     */
    function saveEditLink(id) {
      const linkRow = document.querySelector(`[data-link-id="${id}"]`);
      if (!linkRow) return;

      const input = linkRow.querySelector('.link-row__edit-input');
      if (!input) return;

      const result = updateLink(id, input.value);
      if (!result.success) {
        // Show error inline - could enhance with error display
        alert(result.error);
        return;
      }

      linkRow.classList.remove('editing');
    }

    /**
     * Cancel edit for a link
     * @param {string} id - Link ID
     */
    function cancelEditLink(id) {
      renderLinks(); // Re-render to reset state
    }

    /**
     * Render all links
     */
    function renderLinks() {
      const linksList = document.getElementById('linksList');
      linksList.innerHTML = '';

      relatedLinks.forEach(link => {
        const row = document.createElement('div');
        row.className = 'link-row';
        row.dataset.linkId = link.id;

        // Icon
        const iconEl = document.createElement('div');
        iconEl.className = `link-row__icon ${link.provider}`;
        iconEl.innerHTML = getBrandIcon(link.provider, { size: 12 });

        // Info - just show the URL (truncated via CSS)
        const infoEl = document.createElement('div');
        infoEl.className = 'link-row__info';

        const nameEl = document.createElement('div');
        nameEl.className = 'link-row__name';
        nameEl.textContent = link.name;
        nameEl.title = link.url; // Show full URL on hover

        infoEl.appendChild(nameEl);

        // Actions
        const actionsEl = document.createElement('div');
        actionsEl.className = 'link-row__actions';

        // Edit button
        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'link-row__action edit';
        editBtn.innerHTML = getIcon('pencil', { size: 14 });
        editBtn.title = 'Edit link';
        editBtn.onclick = (e) => {
          e.stopPropagation();
          editLink(link.id);
        };

        // Delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'link-row__action delete';
        deleteBtn.innerHTML = getIcon('minus', { size: 14 });
        deleteBtn.title = 'Remove link';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          removeLink(link.id);
        };

        actionsEl.appendChild(editBtn);
        actionsEl.appendChild(deleteBtn);

        // Edit form (hidden by default)
        const editForm = document.createElement('div');
        editForm.className = 'link-row__edit-form';

        const editInput = document.createElement('input');
        editInput.type = 'url';
        editInput.className = 'link-row__edit-input';
        editInput.value = link.url;
        editInput.placeholder = 'Paste a link...';

        // Handle Enter/Escape in edit input
        editInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            saveEditLink(link.id);
          } else if (e.key === 'Escape') {
            e.preventDefault();
            cancelEditLink(link.id);
          }
        });

        const editActions = document.createElement('div');
        editActions.className = 'link-row__edit-actions';

        const saveBtn = document.createElement('button');
        saveBtn.type = 'button';
        saveBtn.className = 'link-row__edit-btn save';
        saveBtn.innerHTML = getIcon('check', { size: 14 });
        saveBtn.title = 'Save';
        saveBtn.onclick = (e) => {
          e.stopPropagation();
          saveEditLink(link.id);
        };

        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.className = 'link-row__edit-btn cancel';
        cancelBtn.innerHTML = getIcon('x', { size: 14 });
        cancelBtn.title = 'Cancel';
        cancelBtn.onclick = (e) => {
          e.stopPropagation();
          cancelEditLink(link.id);
        };

        editActions.appendChild(saveBtn);
        editActions.appendChild(cancelBtn);
        editForm.appendChild(editInput);
        editForm.appendChild(editActions);

        // Assemble row
        row.appendChild(iconEl);
        row.appendChild(infoEl);
        row.appendChild(actionsEl);
        row.appendChild(editForm);

        // Click row to open link (optional)
        row.addEventListener('click', () => {
          if (!row.classList.contains('editing')) {
            window.open(link.url, '_blank');
          }
        });

        linksList.appendChild(row);
      });
    }

    // Initialize link input handler
    const linkInput = document.getElementById('linkInput');
    linkInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addLink(e.target.value);
      }
    });

    // Also handle paste event for immediate add
    linkInput.addEventListener('paste', (e) => {
      // Small delay to get pasted value
      setTimeout(() => {
        const value = e.target.value.trim();
        if (value && value.includes('.')) {
          addLink(value);
        }
      }, 0);
    });

    // Clear error on input
    linkInput.addEventListener('input', () => {
      const errorEl = document.getElementById('linkInputError');
      errorEl.style.display = 'none';
    });

    // Global click handler to close color popovers when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.color-indicator')) {
        document.querySelectorAll('.color-popover.open').forEach(p => p.classList.remove('open'));
        document.querySelectorAll('.color-indicator.active').forEach(c => c.classList.remove('active'));
      }
    });

    document.getElementById('exp-form').onsubmit = (e) => {
      e.preventDefault();
      // --- Gather form values ---
      const experimentName = document.getElementById('experimentName').value.trim();
      const experimentDescription = document.getElementById('experimentDescription').value.trim();
      const experimentStatus = document.getElementById('experimentStatus').value;
      const rolledoutVariant = document.getElementById('rolledoutVariant').value;

      // --- Build experiment object (v2 schema) ---
      const experimentId = `exp-${Date.now()}`;
      const experiment = {
        id: experimentId,
        name: experimentName,
        roundNumber: 1,
        description: experimentDescription,
        links: {
          // Only include known providers
          figma: (relatedLinks.find(l => l.provider === 'figma') || {}).url || '',
          jira: (relatedLinks.find(l => l.provider === 'jira') || {}).url || '',
          miro: (relatedLinks.find(l => l.provider === 'miro') || {}).url || ''
        },
        outcomes: experimentStatus === 'completed' && rolledoutVariant ? {
          winningPaths: [], // Could be filled if you want
          notes: '' // Could be filled if you want
        } : undefined
      };

      // --- Build metrics array (optional, not used in flow structure directly) ---
      const filledMetrics = metrics
        .filter(m => m.name)
        .map(m => ({
          id: m.id || `metric-${Math.random().toString(36).slice(2)}`,
          name: m.name,
          abbreviation: m.abbreviation,
          min: m.min,
          max: m.max
        }));

      // --- Build flow object (v2 schema) ---
      // Entry node
      const entryNode = {
        id: `entry-${experimentId}`,
        label: 'Entry',
        note: '',
        nodeType: 'ENTRY_NODE'
      };
      // Exit node
      const exitNode = {
        id: `exit-${experimentId}`,
        label: 'Exit',
        nodeType: 'EXIT_NODE'
      };
      // Events and variants
      const sanitizedEvents = JSON.parse(JSON.stringify(events)).map((event, eventIdx) => {
        if (!event.variants) event.variants = [];
        event.variants = event.variants.map((variant, vIdx) => {
          let safeName = typeof variant.name === 'string' && variant.name.trim().length > 0
            ? variant.name
            : `Variant ${String.fromCharCode(65 + vIdx)}`;
          return {
            id: variant.id || `variant-${eventIdx}-${vIdx}-${Date.now()}`,
            parentEventId: event.id || `event-${eventIdx}`,
            key: String.fromCharCode(65 + vIdx),
            name: safeName,
            description: variant.description || '',
            traffic: Number(variant.traffic) || 0,
            metrics: variant.metrics || {},
            style: variant.color ? { variantColor: variant.color } : undefined
          };
        });
        let safeEventName = typeof event.name === 'string' && event.name.trim().length > 0
          ? event.name
          : `Event ${eventIdx + 1}`;
        return {
          id: event.id || `event-${eventIdx}`,
          name: safeEventName,
          nodeType: 'EVENT_NODE',
          entryNote: undefined, // Could be filled if you want
          variants: event.variants
        };
      });

      // --- Build connectors (simple linear for now) ---
      const connectors = [];
      // Entry to first event
      if (sanitizedEvents.length > 0) {
        connectors.push({
          id: `conn-entry-0-${Date.now()}`,
          type: 'PRIMARY_FLOW_LINE',
          from: { nodeType: 'ENTRY_NODE', id: entryNode.id },
          to: { nodeType: 'EVENT_NODE', id: sanitizedEvents[0].id },
          arrowhead: true
        });
      }
      // Event to event
      for (let i = 0; i < sanitizedEvents.length - 1; i++) {
        connectors.push({
          id: `conn-event-${i}-${i+1}-${Date.now()}`,
          type: 'PRIMARY_FLOW_LINE',
          from: { nodeType: 'EVENT_NODE', id: sanitizedEvents[i].id },
          to: { nodeType: 'EVENT_NODE', id: sanitizedEvents[i+1].id },
          arrowhead: true
        });
      }
      // Last event to exit
      if (sanitizedEvents.length > 0) {
        connectors.push({
          id: `conn-exit-${Date.now()}`,
          type: 'PRIMARY_FLOW_LINE',
          from: { nodeType: 'EVENT_NODE', id: sanitizedEvents[sanitizedEvents.length-1].id },
          to: { nodeType: 'EXIT_NODE', id: exitNode.id },
          arrowhead: true
        });
      }

      const flow = {
        id: `flow-${experimentId}`,
        layout: { direction: 'VERTICAL', eventSpacing: 64, variantSpacing: 24 },
        entry: entryNode,
        events: sanitizedEvents,
        exit: exitNode,
        connectors
      };

      // --- Send v2 payload ---
      parent.postMessage({ pluginMessage: {
        type: 'create-flow-v2',
        payload: { experiment, flow }
      } }, '*');
    };

    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    document.querySelector('.btn-add-metric').onclick = (e) => {
      e.preventDefault();
      metrics.push({ 
        id: `metric-${Date.now()}`,
        name: '',
        abbreviation: '',
        min: '',
        max: ''
      });
      renderMetrics(metrics);
    };

    document.querySelector('.btn-add-event').onclick = (e) => {
      e.preventDefault();
      events.push({
        id: `event-${Date.now()}`,
        name: '',
        hasVariants: false,
        variants: []
      });
      renderEvents(events);
    };

    // Links section expand/collapse
    document.getElementById('linksHeader').onclick = () => {
      const subsection = document.getElementById('linksSubsection');
      subsection.classList.toggle('collapsed');
    };

    // ============================================
    // EXPERIMENT STATUS & ROLLED-OUT FUNCTIONALITY
    // ============================================
    
    /**
     * Get all variants from all events
     * @returns {Array} Array of variant objects with event context
     */
    function getAllVariants() {
      const allVariants = [];
      events.forEach((event, eventIndex) => {
        if (event.variants && event.variants.length > 0) {
          event.variants.forEach((variant, variantIndex) => {
            allVariants.push({
              ...variant,
              eventIndex,
              variantIndex,
              eventName: event.name || `Event ${eventIndex + 1}`,
              displayName: variant.name || `Variant ${variantLetters[variantIndex]}`
            });
          });
        }
      });
      return allVariants;
    }

    /**
     * Update the rolled-out variant dropdown options based on available variants
     */
    function updateRolledoutOptions() {
      const dropdown = document.getElementById('rolledoutVariantDropdown');
      const trigger = document.getElementById('rolledoutVariantTrigger');
      const menu = document.getElementById('rolledoutVariantMenu');
      const hiddenInput = document.getElementById('rolledoutVariant');
      const allVariants = getAllVariants();
      
      // Clear existing options
      menu.innerHTML = '';
      
      if (allVariants.length === 0) {
        // No variants available - update trigger to show placeholder
        trigger.innerHTML = `
          <span class="CustomDropdown__text">To select, add variants</span>
          <span class="CustomDropdown__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </span>
        `;
        trigger.classList.add('placeholder');
        hiddenInput.value = '';
      } else {
        // Reset trigger to placeholder if no value selected
        if (!hiddenInput.value) {
          trigger.innerHTML = `
            <span class="CustomDropdown__text">Select variant...</span>
            <span class="CustomDropdown__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </span>
          `;
          trigger.classList.add('placeholder');
        }
        
        // Add variant options
        allVariants.forEach((variant) => {
          const defaultColor = colorPalette[variant.variantIndex % colorPalette.length].hex;
          const variantColor = variant.color || defaultColor;
          
          const option = document.createElement('button');
          option.type = 'button';
          option.className = 'CustomDropdown__option';
          option.dataset.value = variant.id;
          option.dataset.color = variantColor;
          option.dataset.name = variant.displayName;
          
          if (hiddenInput.value === variant.id) {
            option.classList.add('selected');
          }
          
          option.innerHTML = `
            <span class="CustomDropdown__option-badge" style="background-color: ${variantColor}"></span>
            <span class="CustomDropdown__option-text">${variant.displayName}</span>
          `;
          
          option.addEventListener('click', () => {
            selectRolledoutVariant(variant.id, variantColor, variant.displayName);
            dropdown.classList.remove('open');
          });
          
          menu.appendChild(option);
        });
      }
    }

    /**
     * Select a variant in the rolled-out dropdown
     */
    function selectRolledoutVariant(id, color, name) {
      const trigger = document.getElementById('rolledoutVariantTrigger');
      const hiddenInput = document.getElementById('rolledoutVariant');
      const menu = document.getElementById('rolledoutVariantMenu');
      
      // Update hidden input value
      hiddenInput.value = id;
      
      // Update trigger display
      trigger.innerHTML = `
        <span class="CustomDropdown__badge" style="background-color: ${color}"></span>
        <span class="CustomDropdown__text">${name}</span>
        <span class="CustomDropdown__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </span>
      `;
      trigger.classList.remove('placeholder');
      
      // Update selected state in menu
      menu.querySelectorAll('.CustomDropdown__option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === id);
      });
    }

    /**
     * Initialize the rolled-out variant dropdown behavior
     */
    function initRolledoutDropdown() {
      const dropdown = document.getElementById('rolledoutVariantDropdown');
      const trigger = document.getElementById('rolledoutVariantTrigger');
      
      // Toggle dropdown on trigger click
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close other dropdowns
        document.querySelectorAll('.CustomDropdown.open').forEach(d => {
          if (d !== dropdown) d.classList.remove('open');
        });
        dropdown.classList.toggle('open');
      });
    }

    // Status dropdown configuration
    const statusOptions = [
      { value: 'draft', label: 'Draft', color: '#ca8a04' },  
      { value: 'running', label: 'Running', color: '#2563eb' },
      { value: 'paused', label: 'Paused', color: '#dc2626' },
      { value: 'completed', label: 'Completed', color: '#16a34a' },
    ];

    /**
     * Initialize the status dropdown
     */
    function initStatusDropdown() {
      const dropdown = document.getElementById('statusDropdown');
      const trigger = document.getElementById('statusTrigger');
      const menu = document.getElementById('statusMenu');
      const hiddenInput = document.getElementById('experimentStatus');
      
      // Populate menu options
      statusOptions.forEach(status => {
        const option = document.createElement('button');
        option.type = 'button';
        option.className = 'CustomDropdown__option';
        option.dataset.value = status.value;
        option.dataset.color = status.color;
        option.dataset.label = status.label;
        
        if (hiddenInput.value === status.value) {
          option.classList.add('selected');
        }
        
        option.innerHTML = `
          <span class="CustomDropdown__option-text">${status.label}</span>
        `;
        
        option.addEventListener('click', () => {
          selectStatus(status.value, status.color, status.label);
          dropdown.classList.remove('open');
        });
        
        menu.appendChild(option);
      });
      
      // Toggle dropdown on trigger click
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close other dropdowns
        document.querySelectorAll('.CustomDropdown.open').forEach(d => {
          if (d !== dropdown) d.classList.remove('open');
        });
        dropdown.classList.toggle('open');
      });
    }

    /**
     * Select a status in the status dropdown
     */
    function selectStatus(value, color, label) {
      const trigger = document.getElementById('statusTrigger');
      const hiddenInput = document.getElementById('experimentStatus');
      const menu = document.getElementById('statusMenu');
      
      // Update hidden input value
      hiddenInput.value = value;
      
      // Update trigger display
      trigger.innerHTML = `
        <span class="CustomDropdown__text">${label}</span>
        <span class="CustomDropdown__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </span>
      `;
      
      // Update selected state in menu
      menu.querySelectorAll('.CustomDropdown__option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === value);
      });
      
      // Trigger status change handler
      handleStatusChange();
    }

    /**
     * Handle status dropdown change
     */
    function handleStatusChange() {
      const statusInput = document.getElementById('experimentStatus');
      const rolledoutField = document.getElementById('rolledoutField');
      
      if (statusInput.value === 'completed') {
        rolledoutField.classList.remove('hidden');
        updateRolledoutOptions();
      } else {
        rolledoutField.classList.add('hidden');
      }
    }

    // Global click handler for closing dropdowns
    document.addEventListener('click', (e) => {
      document.querySelectorAll('.CustomDropdown.open').forEach(dropdown => {
        if (!dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
        }
      });
    });

    // Override renderEvents to also update rolled-out options when variants change
    const originalRenderEvents = renderEvents;
    renderEvents = function(eventsList) {
      originalRenderEvents(eventsList);
      // Update rolled-out dropdown if it's visible
      const statusInput = document.getElementById('experimentStatus');
      if (statusInput.value === 'completed') {
        updateRolledoutOptions();
      }
    };

    // Initialize the custom dropdowns (must be after function definitions)
    initStatusDropdown();
    initRolledoutDropdown();
  </script>
</body>
</html>
