    // ============================================
    // EXPERIMENT STATUS & ROLLED-OUT FUNCTIONALITY
    // ============================================
    
    /**
     * Get all variants from all events
     * @returns {Array} Array of variant objects with event context
     */
    function getAllVariants() {
      const allVariants = [];
      events.forEach((event, eventIndex) => {
        if (event.variants && event.variants.length > 0) {
          event.variants.forEach((variant, variantIndex) => {
            allVariants.push({
              ...variant,
              eventIndex,
              variantIndex,
              eventName: event.name || `Event ${eventIndex + 1}`,
              displayName: variant.name || `Variant ${variantLetters[variantIndex]}`
            });
          });
        }
      });
      return allVariants;
    }

    /**
     * Update the rolled-out variant dropdown options based on available variants
     */
    function updateRolledoutOptions() {
      const dropdown = document.getElementById('rolledoutVariantDropdown');
      const trigger = document.getElementById('rolledoutVariantTrigger');
      const menu = document.getElementById('rolledoutVariantMenu');
      const hiddenInput = document.getElementById('rolledoutVariant');
      const allVariants = getAllVariants();
      
      // Clear existing options
      menu.innerHTML = '';
      
      if (allVariants.length === 0) {
        // No variants available - update trigger to show placeholder
        trigger.innerHTML = `
          <span class="CustomDropdown__text">To select, add variants</span>
          <span class="CustomDropdown__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </span>
        `;
        trigger.classList.add('placeholder');
        hiddenInput.value = '';
      } else {
        // Reset trigger to placeholder if no value selected
        if (!hiddenInput.value) {
          trigger.innerHTML = `
            <span class="CustomDropdown__text">Select variant...</span>
            <span class="CustomDropdown__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </span>
          `;
          trigger.classList.add('placeholder');
        }
        
        // Add variant options
        allVariants.forEach((variant) => {
          const defaultColor = colorPalette[variant.variantIndex % colorPalette.length].hex;
          const variantColor = variant.color || defaultColor;
          
          const option = document.createElement('button');
          option.type = 'button';
          option.className = 'CustomDropdown__option';
          option.dataset.value = variant.id;
          option.dataset.color = variantColor;
          option.dataset.name = variant.displayName;
          
          if (hiddenInput.value === variant.id) {
            option.classList.add('selected');
          }
          
          option.innerHTML = `
            <span class="CustomDropdown__option-badge" style="background-color: ${variantColor}"></span>
            <span class="CustomDropdown__option-text">${variant.displayName}</span>
          `;
          
          option.addEventListener('click', () => {
            selectRolledoutVariant(variant.id, variantColor, variant.displayName);
            dropdown.classList.remove('open');
          });
          
          menu.appendChild(option);
        });
      }
    }

    /**
     * Select a variant in the rolled-out dropdown
     */
    function selectRolledoutVariant(id, color, name) {
      const trigger = document.getElementById('rolledoutVariantTrigger');
      const hiddenInput = document.getElementById('rolledoutVariant');
      const menu = document.getElementById('rolledoutVariantMenu');
      
      // Update hidden input value
      hiddenInput.value = id;
      
      // Update trigger display
      trigger.innerHTML = `
        <span class="CustomDropdown__badge" style="background-color: ${color}"></span>
        <span class="CustomDropdown__text">${name}</span>
        <span class="CustomDropdown__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </span>
      `;
      trigger.classList.remove('placeholder');
      
      // Update selected state in menu
      menu.querySelectorAll('.CustomDropdown__option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === id);
      });
    }

    /**
     * Initialize the rolled-out variant dropdown behavior
     */
    function initRolledoutDropdown() {
      const dropdown = document.getElementById('rolledoutVariantDropdown');
      const trigger = document.getElementById('rolledoutVariantTrigger');
      
      // Toggle dropdown on trigger click
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close other dropdowns
        document.querySelectorAll('.CustomDropdown.open').forEach(d => {
          if (d !== dropdown) d.classList.remove('open');
        });
        dropdown.classList.toggle('open');
      });
    }

    // Status dropdown configuration
    const statusOptions = [
      { value: 'running', label: 'Running', color: '#2563eb' },
      { value: 'rollout', label: 'Rollout', color: '#16a34a' },
      { value: 'inconclusive', label: 'Inconclusive', color: '#ca8a04' },
      { value: 'stopped', label: 'Stopped/Reverted', color: '#dc2626' }
    ];

    /**
     * Initialize the status dropdown
     */
    function initStatusDropdown() {
      const dropdown = document.getElementById('statusDropdown');
      const trigger = document.getElementById('statusTrigger');
      const menu = document.getElementById('statusMenu');
      const hiddenInput = document.getElementById('experimentStatus');
      
      // Populate menu options
      statusOptions.forEach(status => {
        const option = document.createElement('button');
        option.type = 'button';
        option.className = 'CustomDropdown__option';
        option.dataset.value = status.value;
        option.dataset.color = status.color;
        option.dataset.label = status.label;
        
        if (hiddenInput.value === status.value) {
          option.classList.add('selected');
        }
        
        option.innerHTML = `
          <span class="CustomDropdown__option-text">${status.label}</span>
        `;
        
        option.addEventListener('click', () => {
          selectStatus(status.value, status.color, status.label);
          dropdown.classList.remove('open');
        });
        
        menu.appendChild(option);
      });
      
      // Toggle dropdown on trigger click
      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close other dropdowns
        document.querySelectorAll('.CustomDropdown.open').forEach(d => {
          if (d !== dropdown) d.classList.remove('open');
        });
        dropdown.classList.toggle('open');
      });
    }

    /**
     * Select a status in the status dropdown
     */
    function selectStatus(value, color, label) {
      const trigger = document.getElementById('statusTrigger');
      const hiddenInput = document.getElementById('experimentStatus');
      const menu = document.getElementById('statusMenu');
      
      // Update hidden input value
      hiddenInput.value = value;
      
      // Update trigger display
      trigger.innerHTML = `
        <span class="CustomDropdown__text">${label}</span>
        <span class="CustomDropdown__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </span>
      `;
      
      // Update selected state in menu
      menu.querySelectorAll('.CustomDropdown__option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === value);
      });
      
      // Trigger status change handler
      handleStatusChange();
    }

    /**
     * Handle status dropdown change
     */
    function handleStatusChange() {
      const statusInput = document.getElementById('experimentStatus');
      const rolledoutField = document.getElementById('rolledoutField');
      
      if (statusInput.value === 'rollout') {
        rolledoutField.classList.remove('hidden');
        updateRolledoutOptions();
      } else {
        rolledoutField.classList.add('hidden');
      }
    }

    // Global click handler for closing dropdowns
    document.addEventListener('click', (e) => {
      document.querySelectorAll('.CustomDropdown.open').forEach(dropdown => {
        if (!dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
        }
      });
    });

    // Override renderEvents to also update rolled-out options when variants change
    const originalRenderEvents = renderEvents;
    renderEvents = function(eventsList) {
      originalRenderEvents(eventsList);
      // Update rolled-out dropdown if it's visible
      const statusInput = document.getElementById('experimentStatus');
      if (statusInput.value === 'rollout') {
        updateRolledoutOptions();
      }
    };

    // Initialize the custom dropdowns (must be after function definitions)
    initStatusDropdown();
    initRolledoutDropdown();
  </script>
</body>
</html>
