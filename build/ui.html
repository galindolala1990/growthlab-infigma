<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /*
     * FIGTREE FONT (self-hosted for Figma plugin sandbox compatibility)
     * Using WOFF2 format with base64 encoding for best compatibility
     */
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/Figtree-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('fonts/Figtree-Medium.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('fonts/Figtree-SemiBold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Figtree';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('fonts/Figtree-Bold.woff2') format('woff2');
    }

    /* 
     * DESIGN TOKENS (inlined for Figma plugin sandbox compatibility)
     */
    :root {
      /* === Typography System (from Figma) === */
      --heading-h1-size: 12px;
      --heading-h1-weight: 600;
      --heading-h1-line-height: 100%;
      --heading-h2-size: 11px;
      --heading-h2-weight: 500;
      --heading-h2-line-height: 91%;
      --body-md-size: 11px;
      --body-md-weight: 400;
      --body-md-line-height: 130%;
      --body-lg-size: 12px;
      --body-lg-weight: 400;
      --body-lg-line-height: 120%;
      --body-sm-size: 10px;
      --body-sm-weight: 400;
      --body-sm-line-height: 130%;
      --label-size: 9px;
      --label-weight: 500;
      --label-line-height: 100%;
      --input-text-size: 11px;
      --input-text-weight: 400;
      --input-text-line-height: 91%;

      /* === Colors === */
      --primary: #6F4CFF;
      --primary-foreground: #FFFFFF;
      --primary-hover: #5F3DE6;
      --primary-active: #4C2FCC;
      --primary-soft: #F0EBFF;
      --background: #FFFFFF;
      --background-subtle: #F9FAFB;
      --background-surface: #FFFFFF;
      --background-muted: #ECEFF2;
      --foreground: #0F1729;
      --text-secondary: #333B47;
      --text-muted: #3F4C5F;
      --text-subtle: #D1D5DB;
      --border: #EDEDF1;
      --border-dark: #D8DBDF;
      --accent-success: #126930;
      --accent-success-bg: #eaf7f0;
      --accent-primary-dark: #18305a;
      --typography-h1-color: #18305a;
      --typography-h2-color: #18305a;
      --typography-meta-color: #4a5a70;

      /* === Spacing === */
      --space-4: 4px;
      --space-8: 8px;
      --space-10: 10px;
      --space-12: 12px;
      --space-16: 16px;
      --space-24: 24px;

      /* === Border Radius === */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --radius-xl: 18px;

      /* === Component Variables === */
      --section-padding: 16px;
      --section-gap: 16px;
      --section-radius: 18px;
      --section-shadow: 0 4px 16px 0 rgba(40,60,90,0.06);
      --input-bg: #FFFFFF;
      --input-border: 1px solid #dbe3ef;
      --input-radius: 4px;
      --input-padding-x: 9px;
      --input-padding-y: 7px;
      --input-height: 40px;
      --button-padding: 6px;
      --button-radius: 4px;
      --button-gap: 4px;
      --container-gap: 4px;
      --variant-card-bg: #ECEFF2;
      --variant-card-border: #EDEDF1;
      --variant-card-shadow: 0 2px 8px 0 rgba(40,60,90,0.06);
      --variant-traffic-bg: #eaf7f0;
      --variant-traffic-border: #b6e2c6;
      --variant-traffic-color: #126930;

      /* === Input Field Component (from Figma node 353-7322) === */
      --input-field-bg: rgba(34, 39, 47, 0.05);
      --input-field-border-color: rgba(34, 39, 47, 0.1);
      --input-field-border: 1px solid rgba(34, 39, 47, 0.1);
      --input-field-radius: 4px;
      --input-field-padding-x: 9px;
      --input-field-padding-y: 7px;
      --input-field-gap: 8px;
      --input-field-label-gap: 5px;
      --input-field-horizontal-gap: 12px;
      --input-field-text-color: #3f4c5f;
      --input-field-placeholder-opacity: 0.8;
      --input-field-hover-bg: rgba(34, 39, 47, 0.08);
      --input-field-hover-border: rgba(34, 39, 47, 0.15);
      --input-field-focus-border: #6F4CFF;
      --input-field-focus-shadow: 0 0 0 2px rgba(111, 76, 255, 0.15);
    }

    /* 
     * FIGMA PLUGIN TYPOGRAPHY
     */
    
    /* Reset & Base Typography */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    /* Heading 1 */
    h1 {
      font-size: var(--heading-h1-size);
      font-weight: var(--heading-h1-weight);
      line-height: var(--heading-h1-line-height);
      color: var(--typography-h1-color);
      letter-spacing: -0.01em;
    }
    
    /* Heading 2 */
    h2 {
      font-size: var(--heading-h2-size);
      font-weight: var(--heading-h2-weight);
      line-height: var(--heading-h2-line-height);
      color: var(--typography-h2-color);
      letter-spacing: -0.005em;
    }
    
    /* Body Medium (default) */
    p, .body-md {
      font-size: var(--body-md-size);
      font-weight: var(--body-md-weight);
      line-height: var(--body-md-line-height);
      color: var(--text-secondary);
    }
    
    /* Body Large */
    .body-lg {
      font-size: var(--body-lg-size);
      font-weight: var(--body-lg-weight);
      line-height: var(--body-lg-line-height);
      color: var(--text-secondary);
    }
    
    /* Body Small */
    .body-sm {
      font-size: var(--body-sm-size);
      font-weight: var(--body-sm-weight);
      line-height: var(--body-sm-line-height);
      color: var(--text-muted);
    }
    
    /* Form Elements */
    input, button, select, textarea {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: var(--body-md-size);
    }

    /* App Container */
    .app {
      background: var(--background-subtle);
      min-height: 100vh;
    }

    /* Section Header (from Figma: padding=16px, spacing=16px) */
    .section-header {
      background: var(--background-surface);
      border-bottom: 1px solid var(--border);
      padding: var(--section-padding);
    }

    .header-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      margin-bottom: var(--space-16);
    }

    .header-inputs {
      display: flex;
      flex-direction: column;
      gap: var(--space-16);
    }

    /* Form Inputs */
    .Input {
      background: var(--input-bg);
      border: var(--input-border);
      border-radius: var(--input-radius);
      height: var(--input-height);
      padding: var(--input-padding-y) var(--input-padding-x);
      color: var(--foreground);
      font-size: var(--input-text-size);
      font-weight: var(--input-text-weight);
      line-height: var(--input-text-line-height);
    }

    .Input::placeholder {
      color: var(--text-subtle);
    }

    .Input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }

    /* Form Container*/
    .form-container {
      display: flex;
      flex-direction: column;
    }

    /* Section Metrics & Events */
    .section-metrics,
    .section-events {
      background: var(--background-surface);
      border-bottom: 1px solid var(--border);
      padding: var(--space-16);
    }

    .metrics-header,
    .events-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-16);
    }

    .events-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    .events-header-left h2 {
      padding: 4px 0;
    }

    /* Add Event Button */
    .btn-add-event {
      width: 26px;
      height: 24px;
      border-radius: var(--button-radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-add-event:hover {
      background: var(--background-muted);
    }

     .btn-add-event:active {
      background: var(--background-subtle);
    }

    .btn-add-event svg {
      width: 14px;
      height: 14px;
    }

    .metrics-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    .metrics-count,
    .events-count {
      font-size: var(--body-md-size);
      font-weight: 400;
      color: var(--text-muted);
    }

    /* Add Metric Button (from Figma: radius=4px) */
    .btn-add-metric {
      width: 26px;
      height: 24px;
      border-radius: var(--button-radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-add-metric:hover {
      background: var(--background-muted);
    }

    .btn-add-metric:active {
      background: var(--background-subtle);
    }
    .btn-add-metric svg {
      width: 14px;
      height: 14px;
    }

    /* Metric Cards */
    .metrics-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .metric-row {
      display: flex;
      align-items: flex-end;
      gap: var(--space-8);
      padding-bottom: var(--space-16);
      border-bottom: 1px dashed transparent;
    }

    .metric-row:not(:last-child) {
      border-bottom-color: var(--border);
    }

    .metric-row + .metric-row {
      padding-top: var(--space-16);
    }

    /* Metric name field (flexible width) */
    .metric-name-field {
      flex: 1;
      min-width: 0;
    }

    /* Min/Max range container */
    .metric-range-container {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      padding-left: var(--space-8);
    }

    .metric-range-field {
      width: 50px;
    }

    .metric-range-separator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 44px;
      padding-bottom: 7px;
    }

    .metric-range-separator span {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 10px;
    }

    /* Delete button */
    .metric-delete-btn {
      width: 26px;
      height: 24px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .metric-delete-btn:hover {
      background: rgba(242, 78, 30, 0.1);
      color: #f24e1e;
    }

    .metric-delete-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Empty state */
    .metrics-empty-state {
      text-align: center;
      padding: var(--space-24);
      color: var(--text-muted);
      font-size: var(--body-md-size);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
    }

    .metrics-empty-state.hidden {
      display: none;
    }

    /* Tooltip styling */
    [data-tooltip] {
      position: relative;
      cursor: help;
    }

    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--foreground);
      color: var(--background-surface);
      padding: var(--space-8) var(--space-12);
      border-radius: var(--radius-xs);
      font-size: 9px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
    }

    [data-tooltip]::before {
      content: '';
      position: absolute;
      bottom: 118%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--foreground);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
    }

    [data-tooltip]:hover::after,
    [data-tooltip]:hover::before {
      opacity: 1;
    }

    /* ============================================
     * FLOW SECTION (Events + Variants)
     * ============================================ */
    
    /* Events List Container */
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Individual Event Row */
    .event-row {
      display: flex;
      flex-direction: column;
      /* gap: var(--space-8);*/
    }

    .event-row-main {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      padding-bottom: var(--space-16);
      padding-top: var(--space-16);
      border-bottom: 1px dashed var(--border);
    }

    .event-row-main:not(:last-child) {
      border-bottom-color: var(--border);
    }

    /* Hide border when variants container follows */
    .event-row:has(.event-variants-container) .event-row-main {
      /*border-bottom-color: transparent;*/
      border: none;
    }
    

    /* Event step number badge */
    .event-step {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 20px;
      flex-shrink: 0;
    }

    .event-step-badge {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-secondary);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .event-flow-line {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 16px;
      border-left: 1px dashed var(--border-dark);
    }

    .event-flow-line:first-child {
      bottom: 100%;
    }

    .event-flow-line:last-child {
      top: 100%;
    }

    /* Event input field container */
    .event-input-container {
      flex: 1;
      min-width: 0;
    }

    /* Event action buttons */
    .event-actions {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    .event-action-btn {
      width: 26px;
      height: 24px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .event-action-btn:hover {
      background: rgba(34, 39, 47, 0.08);
    }

    .event-action-btn.delete:hover {
      background: rgba(242, 78, 30, 0.1);
      color: #f24e1e;
    }

    .event-action-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Variants container (nested under event) */
    .event-variants-container {
      display: flex;
      gap: var(--space-8);
      margin-top: -1px
      /*margin-left: 9px;
      padding-left: var(--space-8);*/
    }

    .event-variants-line {
      width: 1px;
      border-left: 1px dashed var(--border-dark);
      flex: 1;
      min-height: 40px;
    }

    .event-variants-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0px 2px;
      flex-shrink: 0;
      width: 20px
    }

    .variants-list {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    /* Variant Card - States: Default, Entered, onHover, onDrag */
    .variant-card {
      display: flex;
      align-items: flex-start;
      gap: var(--space-8);
      padding: var(--space-12) var(--space-8);
      background: transparent;
      border-bottom: 1px dashed var(--border);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      min-width: 0;
      width: 100%;
      cursor: grab;
      user-select: none;
    }

    .variant-card:last-child {
      border-bottom: none;
    }

    /* Hover state */
    .variant-card:hover {
      background: rgba(236, 239, 242, 0.4);
    }

    /* Dragging state */
    .variant-card.dragging {
      background: rgba(236, 239, 242, 0.4);
      border-top: 0.5px solid var(--text-secondary);
      box-shadow: 0 2px 8px rgba(40, 60, 90, 0.1);
      cursor: grabbing;
    }

    /* Active/pressed state */
    .variant-card:active {
      cursor: grabbing;
    }

    /* Interactive elements within card should have default cursor */
    .variant-card input,
    .variant-card button,
    .variant-card select,
    .variant-card textarea {
      cursor: auto;
      user-select: auto;
    }

    .variant-card button {
      cursor: pointer;
    }

    /* Variant letter badge */
    .variant-badge {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .variant-badge.variant-a { background: #2563eb; color: #fff; }
    .variant-badge.variant-b { background: #0eab43; color: #fff; }
    .variant-badge.variant-c { background: #dd7602; color: #fff; }
    .variant-badge.variant-d { background: #8b5cf6; color: #fff; }
    .variant-badge.variant-add { background: var(--border-dark); color: var(--text-secondary); }

    /* Variant content area */
    .variant-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-16);
      flex: 1;
      min-width: 0;
    }

    .variant-row {
      display: flex;
      gap: var(--space-8);
    }

    .variant-name-field {
      flex: 1;
      min-width: 0;
    }

    .variant-traffic-field {
      width: 70px;
      flex-shrink: 0;
    }

    /* Variant metrics row */
    .variant-metrics-row {
      display: flex;
      gap: var(--space-16);
      align-items: flex-end;
    }

    .variant-metric-field {
      flex: 1;
      min-width: 60px;
    }

    /* ============================================
     * EXPERIMENT STATUS SECTION
     * Status dropdown + Rolled-out variant selector
     * ============================================ */
    
    .experiment-status-section {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .experiment-status-row {
      display: flex;
      align-items: flex-end;
      gap: var(--space-12);
    }

    .status-field {
      flex: 1;
      min-width: 120px;
      max-width: 150px;
    }

    .rolledout-field {
      flex: 1;
      min-width: 120px;
    }

    .rolledout-field.hidden {
      display: none;
    }

    /* Custom select/dropdown styling */
    .SelectField {
      display: flex;
      flex-direction: column;
      gap: var(--input-field-label-gap);
    }

    .SelectField__label {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 9px;
      font-weight: 500;
      line-height: 100%;
      letter-spacing: 0.09px;
      color: var(--input-field-text-color);
      padding: 3px 0;
    }

    .SelectField__wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .SelectField__select {
      width: 100%;
      height: 28px;
      padding: var(--input-field-padding-y) var(--input-field-padding-x);
      padding-right: 28px;
      background: var(--input-field-bg);
      border: var(--input-field-border);
      border-radius: var(--input-field-radius);
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: var(--input-text-size);
      font-weight: var(--input-text-weight);
      color: var(--input-field-text-color);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .SelectField__select:hover {
      background: var(--input-field-hover-bg);
      border-color: var(--input-field-hover-border);
    }

    .SelectField__select:focus {
      outline: none;
      border-color: var(--input-field-focus-border);
      box-shadow: var(--input-field-focus-shadow);
    }

    .SelectField__icon {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .SelectField__icon svg {
      width: 12px;
      height: 12px;
    }

    /* Status-specific badge colors */
    .SelectField__select option[value="running"] { color: #2563eb; }
    .SelectField__select option[value="rollout"] { color: #16a34a; }
    .SelectField__select option[value="inconclusive"] { color: #ca8a04; }
    .SelectField__select option[value="stopped"] { color: #dc2626; }

    /* Status indicator dot */
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.running { background-color: #2563eb; }
    .status-dot.rollout { background-color: #16a34a; }
    .status-dot.inconclusive { background-color: #ca8a04; }
    .status-dot.stopped { background-color: #dc2626; }

    /* Variant actions */
    .variant-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      flex-shrink: 0;
    }

    .variant-action-btn {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .variant-action-btn:hover {
      background: rgba(34, 39, 47, 0.08);
    }

    .variant-action-btn.remove:hover {
      background: rgba(242, 78, 30, 0.1);
      color: #f24e1e;
    }

    .variant-action-btn svg {
      width: 12px;
      height: 12px;
    }

    /* Empty state for events */
    .events-empty-state {
      text-align: center;
      padding: var(--space-24);
      color: var(--text-muted);
      font-size: var(--body-md-size);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
    }

    .events-empty-state.hidden {
      display: none;
    }

    /* Footer Section */
    .section-footer {
      display: flex;
      flex-direction: row-reverse;
      gap: var(--space-16);
      background: var(--background-surface);
      border-bottom: 1px solid var(--border);
      padding: var(--space-16);
    }

    /* Buttons */
    /* Buttons (from Figma: padding=6px, radius=4px, gap=4px) */
    .Button {
      height: var(--input-height);
      padding: var(--button-padding) var(--space-24);
      border-radius: var(--button-radius);
      font-size: var(--body-md-size);
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--button-gap);
      transition: background 0.15s, box-shadow 0.15s;
    }

    .Button.primary {
      background: var(--primary);
      color: var(--primary-foreground);
    }

    .Button.primary:hover {
      background: var(--primary-hover);
    }

    .Button.primary:active {
      background: var(--primary-active);
    }

    .Button.secondary {
      background: var(--background-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .Button.secondary:hover {
      background: var(--background-muted);
      border-color: var(--border-dark);
    }

    /* ============================================
     * INPUT FIELD COMPONENT (from Figma 353-7322)
     * Props: label, showLabel, showRText, showRIcon, showLText, smallText, help, text
     * Variants: state (default/entered), variant (vertical/horizontal), hover (no/yes)
     * ============================================ */
    
    /* Base Input Field Container */
    .InputField {
      display: flex;
      flex-direction: column;
      gap: var(--input-field-label-gap);
      width: 100%;
    }

    /* Horizontal variant */
    .InputField.horizontal {
      flex-direction: row;
      align-items: center;
      gap: var(--input-field-horizontal-gap);
    }

    .InputField.horizontal .InputField__label {
      flex-shrink: 0;
      min-width: fit-content;
    }

    .InputField.horizontal .InputField__wrapper {
      flex: 1;
    }

    /* Label */
    .InputField__label {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 9px;
      font-weight: 500;
      line-height: 100%;
      letter-spacing: 0.09px;
      color: var(--input-field-text-color);
      padding: 3px 0;
    }

    .InputField__label.hidden {
      display: none;
    }

    /* Input wrapper (the actual input box) */
    .InputField__wrapper {
      display: flex;
      align-items: center;
      max-height: 24px;
      gap: var(--input-field-gap);
      background: var(--input-field-bg);
      border: var(--input-field-border);
      border-radius: var(--input-field-radius);
      padding: var(--input-field-padding-y) var(--input-field-padding-x);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    /* Hover state */
    .InputField__wrapper:hover,
    .InputField.hover .InputField__wrapper {
      background: var(--input-field-hover-bg);
      border-color: var(--input-field-hover-border);
    }

    /* Focus state */
    .InputField__wrapper:focus-within {
      border-color: var(--input-field-focus-border);
      box-shadow: var(--input-field-focus-shadow);
    }

    /* Left text (prefix like "(CR)") */
    .InputField__prefix {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 400;
      line-height: 100%;
      color: var(--input-field-text-color);
      flex-shrink: 0;
    }

    .InputField__prefix.hidden {
      display: none;
    }

    /* The actual input element */
    .InputField__input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 400;
      line-height: 10px;
      color: var(--foreground);
      min-width: 0;
    }

    .InputField__input::placeholder {
      color: var(--input-field-text-color);
      opacity: var(--input-field-placeholder-opacity);
    }

    /* State: entered - placeholder hidden, value shown */
    .InputField.entered .InputField__input::placeholder {
      opacity: 0;
    }

    /* Right text (suffix) */
    .InputField__suffix {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 400;
      line-height: 100%;
      color: var(--input-field-text-color);
      flex-shrink: 0;
    }

    .InputField__suffix.hidden {
      display: none;
    }

    /* Right icon (dropdown arrow) */
    .InputField__icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--foreground);
    }

    .InputField__icon.hidden {
      display: none;
    }

    .InputField__icon svg {
      width: 12px;
      height: 12px;
    }
    /* ============================================
     * LINKS SECTION
     * External links: Figma, Jira, Miro
     * ============================================ */
    
    .section-links {
      background: var(--background-surface);
      border: 1px solid var(--border);
      padding: var(--space-16);
    }

    /* Links subsection inside events section */
    .links-subsection {
      /* margin-top: var(--space-16);*/
      padding-top: var(--space-8);
    }

    .links-header {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-12);
      cursor: pointer;
      user-select: none;
    }

    .links-header:hover {
      opacity: 0.8;
    }

    .links-header__label {
      font-family: Figtree, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 9px;
      font-weight: 500;
      line-height: 100%;
      letter-spacing: 0.09px;
      color: var(--input-field-text-color);
      padding: 3px 0;
    }

    .links-header__chevron {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      color: var(--input-field-text-color);
      transition: transform 0.2s ease;
    }

    .links-header__chevron svg {
      width: 12px;
      height: 12px;
    }

    /* Collapsed state */
    .links-subsection.collapsed .links-header__chevron {
      transform: rotate(-90deg);
    }

    .links-subsection.collapsed .links-list {
      display: none;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-16);
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--background-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-size: var(--body-sm-size);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      max-width: 100%;
      overflow: hidden;
    }

    .link-chip:hover {
      background: var(--background-subtle);
      border-color: var(--border-dark);
    }

    .link-chip__text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-chip__remove {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 10px;
      line-height: 1;
    }

    .link-chip__remove:hover {
      background: var(--border);
      color: var(--foreground);
    }

    .link-add-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: transparent;
      border: 1px dashed var(--border-dark);
      border-radius: var(--radius-xs);
      font-size: var(--body-sm-size);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .link-add-btn:hover {
      background: var(--background-muted);
      border-color: var(--primary);
      color: var(--primary);
    }

    .link-add-btn svg {
      width: 12px;
      height: 12px;
    }

    /* Link icon as InputField label (horizontal variant) */
    .InputField__label.link-icon {
      width: 24px;
      height: 24px;
      min-width: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: var(--radius-xs);
      padding: 0;
    }

    .InputField__label.link-icon svg {
      width: 14px;
      height: 14px;
    }

    /* Brand colors from Simple Icons - https://simpleicons.org */
    .InputField__label.link-icon.figma {
      background: #F5F5F5; /* Neutral background for multi-color logo */
    }

    .InputField__label.link-icon.jira {
      background: #E9F2FF; /* Light blue background for gradient logo */
    }

    .InputField__label.link-icon.miro {
      background: #FFD02F; /* Official Miro yellow */
      color: #050038; /* Official Miro dark navy */
    }
  </style>
</head>
<body>
  <div class="app" id="container">
    <form id="exp-form" autocomplete="off" class="form-container">
      <!-- Header Section -->
      <section class="section-header">
        <div class="header-content">
          <h1>Create experiment</h1>
          <p class="body-md">Group design variants and streamline your growth experiments.</p>
        </div>
        <div class="header-inputs">
          <!-- InputField Component: Vertical variant, default state -->
          <div class="InputField" data-state="default" data-variant="vertical">
            <label class="InputField__label">Experiment name</label>
            <div class="InputField__wrapper">
              <span class="InputField__prefix hidden">(CR)</span>
              <input class="InputField__input" type="text" id="experimentName" placeholder="Untitled experiment">
              <span class="InputField__suffix hidden"></span>
              <!-- Lucide: chevron-down -->
              <span class="InputField__icon hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m6 9 6 6 6-6"/>
                </svg>
              </span>
            </div>
          </div>

          <!-- InputField Component: Vertical variant, default state -->
          <div class="InputField" data-state="default" data-variant="vertical">
            <label class="InputField__label">Description</label>
            <div class="InputField__wrapper">
              <span class="InputField__prefix hidden"></span>
              <input class="InputField__input" type="text" id="experimentDescription" placeholder="Add description">
              <span class="InputField__suffix hidden"></span>
              <span class="InputField__icon hidden"></span>
            </div>
          </div>

          <!-- Experiment Status Section -->
          <div class="experiment-status-section">
            <div class="experiment-status-row">
              <!-- Status Dropdown -->
              <div class="status-field">
                <div class="SelectField">
                  <label class="SelectField__label" for="experimentStatus">Status</label>
                  <div class="SelectField__wrapper">
                    <select class="SelectField__select" id="experimentStatus">
                      <option value="running">Running</option>
                      <option value="rollout">Rollout</option>
                      <option value="inconclusive">Inconclusive</option>
                      <option value="stopped">Stopped/Reverted</option>
                    </select>
                    <span class="SelectField__icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6"/>
                      </svg>
                    </span>
                  </div>
                </div>
              </div>

              <!-- Rolled-out Variant Dropdown (shown only when status is "rollout") -->
              <div class="rolledout-field hidden" id="rolledoutField">
                <div class="SelectField">
                  <label class="SelectField__label" for="rolledoutVariant">Rolled-out</label>
                  <div class="SelectField__wrapper">
                    <select class="SelectField__select" id="rolledoutVariant">
                      <option value="" disabled selected>To select, add variants</option>
                    </select>
                    <span class="SelectField__icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6"/>
                      </svg>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Links subsection -->
        <div class="links-subsection" id="linksSubsection">
          <div class="links-header" id="linksHeader">
            <span class="links-header__chevron">
              <!-- Lucide: chevron-down -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </span>
            <span class="links-header__label">Links</span>
          </div>
          <div class="links-list" id="linksList">
            <!-- Figma Link - InputField Component: Horizontal variant with icon -->
            <div class="InputField horizontal" data-state="default" data-variant="horizontal">
              <label class="InputField__label link-icon figma" aria-label="Figma">
                <!-- Official Figma multi-color logo -->
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8 24c2.208 0 4-1.792 4-4v-4H8c-2.208 0-4 1.792-4 4s1.792 4 4 4z" fill="#0ACF83"/>
                  <path d="M4 12c0-2.208 1.792-4 4-4h4v8H8c-2.208 0-4-1.792-4-4z" fill="#A259FF"/>
                  <path d="M4 4c0-2.208 1.792-4 4-4h4v8H8C5.792 8 4 6.208 4 4z" fill="#F24E1E"/>
                  <path d="M12 0h4c2.208 0 4 1.792 4 4s-1.792 4-4 4h-4V0z" fill="#FF7262"/>
                  <path d="M20 12c0 2.208-1.792 4-4 4s-4-1.792-4-4 1.792-4 4-4 4 1.792 4 4z" fill="#1ABCFE"/>
                </svg>
              </label>
              <div class="InputField__wrapper">
                <span class="InputField__prefix hidden"></span>
                <input class="InputField__input" type="url" id="figmaLink" placeholder="Paste Figma link...">
                <span class="InputField__suffix hidden"></span>
                <span class="InputField__icon hidden"></span>
              </div>
            </div>

            <!-- Jira Link - InputField Component: Horizontal variant with icon -->
            <div class="InputField horizontal" data-state="default" data-variant="horizontal">

                <svg viewBox="0 0 24 24" fill="none">
                  <defs>
                    <linearGradient id="jira-gradient-1" x1="98.03%" x2="58.89%" y1=".22%" y2="40.21%">
                      <stop offset="0%" stop-color="#0052CC"/>
                      <stop offset="92.29%" stop-color="#2684FF"/>
                    </linearGradient>
                    <linearGradient id="jira-gradient-2" x1="100.98%" x2="55.67%" y1=".35%" y2="44.49%">
                      <stop offset="0%" stop-color="#0052CC"/>
                      <stop offset="92.29%" stop-color="#2684FF"/>
                    </linearGradient>
                  </defs>
                  <path fill="#2684FF" d="M23.013 0H11.455a5.215 5.215 0 0 0 5.215 5.215h2.129v2.057A5.215 5.215 0 0 0 24 12.483V1.005A1.001 1.001 0 0 0 23.013 0Z"/>
                  <path fill="url(#jira-gradient-1)" d="M17.294 5.757H5.736a5.215 5.215 0 0 0 5.215 5.214h2.129v2.058a5.218 5.218 0 0 0 5.215 5.214V6.758a1.001 1.001 0 0 0-1.001-1.001Z"/>
                  <path fill="url(#jira-gradient-2)" d="M11.571 11.513H0a5.218 5.218 0 0 0 5.232 5.215h2.13v2.057A5.215 5.215 0 0 0 12.575 24V12.518a1.005 1.005 0 0 0-1.005-1.005Z"/>
                </svg>
              </label>
              <div class="InputField__wrapper">
                <span class="InputField__prefix hidden"></span>
                <input class="InputField__input" type="url" id="jiraLink" placeholder="Paste Jira ticket link...">
                <span class="InputField__suffix hidden"></span>
                <span class="InputField__icon hidden"></span>
              </div>
            </div>

            <!-- Miro Link - InputField Component: Horizontal variant with icon -->
            <div class="InputField horizontal" data-state="default" data-variant="horizontal">
              <label class="InputField__label link-icon miro" aria-label="Miro">
                <!-- Simple Icons: miro - https://simpleicons.org/?q=miro -->
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.392 0H13.9L17 4.808 10.444 0H6.949l3.102 6.3L3.494 0H0l3.05 8.131L0 24h3.494L10.05 6.985 6.949 24h3.494L17 5.494 13.899 24h3.493L24 3.672 17.392 0z"/>
                </svg>
              </label>
              <div class="InputField__wrapper">
                <span class="InputField__prefix hidden"></span>
                <input class="InputField__input" type="url" id="miroLink" placeholder="Paste Miro board link...">
                <span class="InputField__suffix hidden"></span>
                <span class="InputField__icon hidden"></span>
              </div>
            </div>
          </div>
        </div>
        </div>

        
      </section>
    
      <!-- Metrics Section -->
      <section class="section-metrics">
        <div class="metrics-header">
          <div class="metrics-header-left">
            <h2>Metrics</h2>
            <span class="metrics-count" id="metricsCount"></span>
          </div>
          <button class="btn-add-metric" type="button" aria-label="Add metric" title="Add a new metric">
            <!-- Lucide: plus -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/>
              <path d="M12 5v14"/>
            </svg>
          </button>
        </div>
        <div class="metrics-list" id="metricsList">
          <!-- Metric rows inserted by JS -->
        </div>
        <!-- Empty state placeholder -->
        <div class="metrics-empty-state" id="metricsEmptyState">
          <p>No metrics yet. Click the + button to add your first metric.</p>
        </div>
      </section>

      <!-- Flow Section (Events + Variants) -->
      <section class="section-events">
        <div class="events-header">
          <div class="events-header-left">
            <h2>Flow</h2>
            <span class="events-count" id="eventsCount">0 events • 0 variants</span>
          </div>
          <button class="btn-add-event" type="button" aria-label="Add event" title="Add a new event">
            <!-- Lucide: plus -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/>
              <path d="M12 5v14"/>
            </svg>
          </button>
        </div>
        <div class="events-list" id="eventsList">
          <!-- Event rows inserted by JS -->
        </div>
        <!-- Empty state placeholder -->
        <div class="events-empty-state" id="eventsEmptyState">
          <p>No events yet. Click the + button to add your first event.</p>
        </div>
      </section>

      <!-- Footer Section -->
      <footer class="section-footer">
        <button type="submit" class="Button primary">Create flow</button>
        <button type="button" id="cancel" class="Button secondary">Cancel</button>
      </footer>
    </form>
  </div>

    const brandIcons = {
      // https://simpleicons.org/?q=figma
      'figma': '<path d="M15.852 8.981h-4.588V0h4.588c2.476 0 4.49 2.014 4.49 4.49s-2.014 4.491-4.49 4.491zM12.735 7.51h3.117c1.665 0 3.019-1.355 3.019-3.019s-1.355-3.019-3.019-3.019h-3.117V7.51zm0 1.471H8.148c-2.476 0-4.49-2.014-4.49-4.49S5.672 0 8.148 0h4.588v8.981zm-4.587-7.51c-1.665 0-3.019 1.355-3.019 3.019s1.354 3.02 3.019 3.02h3.117V1.471H8.148zm4.587 15.019H8.148c-2.476 0-4.49-2.014-4.49-4.49s2.014-4.49 4.49-4.49h4.588v8.98zM8.148 8.981c-1.665 0-3.019 1.355-3.019 3.019s1.355 3.019 3.019 3.019h3.117V8.981H8.148zM8.172 24c-2.489 0-4.515-2.014-4.515-4.49s2.014-4.49 4.49-4.49h4.588v4.441c0 2.503-2.047 4.539-4.563 4.539zm-.024-7.51a3.023 3.023 0 0 0-3.019 3.019c0 1.665 1.365 3.019 3.044 3.019 1.705 0 3.093-1.376 3.093-3.068v-2.97H8.148zm7.704 0h-.098c-2.476 0-4.49-2.014-4.49-4.49s2.014-4.49 4.49-4.49h.098c2.476 0 4.49 2.014 4.49 4.49s-2.014 4.49-4.49 4.49zm-.097-7.509c-1.665 0-3.019 1.355-3.019 3.019s1.355 3.019 3.019 3.019h.098c1.665 0 3.019-1.355 3.019-3.019s-1.355-3.019-3.019-3.019h-.098z"/>',

    /**
     * Get a brand icon SVG string
     * @param {string} name - Icon name (e.g., 'figma', 'miro', 'jira')
     * @param {Object} options - Optional overrides for SVG attributes
     * @returns {string} Complete SVG markup
     */
    function getBrandIcon(name, options = {}) {
      const {
        size = 24,
        className = ''
      } = options;
      
      const iconPath = brandIcons[name];
      if (!iconPath) {
        console.warn(`Brand icon "${name}" not found`);
        return '';
      }
      
      return `<svg class="brand-icon brand-icon-${name}${className ? ' ' + className : ''}" viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor">${iconPath}</svg>`;
    }

    /**
     * Get a Lucide icon SVG string
     * @param {string} name - Icon name (e.g., 'plus', 'trash-2')
     * @param {Object} options - Optional overrides for SVG attributes
     * @returns {string} Complete SVG markup
     */
    function getIcon(name, options = {}) {
      const {
        size = 24,
        strokeWidth = 2,
        className = ''
      } = options;
      
      const iconPath = lucideIcons[name];
      if (!iconPath) {
        console.warn(`Lucide icon "${name}" not found`);
        return '';
      }
      
      return `<svg class="lucide lucide-${name}${className ? ' ' + className : ''}" viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg>`;
    }

    /**
     * InputField Component Factory
     * Creates an input field component with all Figma props and variants
     * 
     * @param {Object} props - Component properties
     * @param {string} props.id - Input element ID
     * @param {string} props.label - Label text (default: "Label")
     * @param {boolean} props.showLabel - Show/hide label (default: true)
     * @param {boolean} props.showRText - Show right suffix text (default: false)
     * @param {boolean} props.showRIcon - Show dropdown icon (default: false)
     * @param {boolean} props.showLText - Show left prefix text (default: false)
     * @param {string} props.smallText - Prefix text like "(CR)" (default: "(CR)")
     * @param {string} props.help - Placeholder text (default: "Enter input")
     * @param {string} props.text - Input value (default: "")
     * @param {string} props.suffix - Suffix text (default: "")
     * @param {string} props.state - "default" or "entered" (default: "default")
     * @param {string} props.variant - "vertical" or "horizontal" (default: "vertical")
     * @param {Function} props.onChange - Change handler
     * @returns {HTMLElement} The InputField container element
     */
    function createInputField(props = {}) {
      const {
        id = 'input-' + Math.random().toString(36).substr(2, 9),
        label = 'Label',
        showLabel = true,
        showRText = false,
        showRIcon = false,
        showLText = false,
        smallText = '(CR)',
        help = 'Enter input',
        text = '',
        suffix = '',
        state = 'default',
        variant = 'vertical',
        onChange = null
      } = props;

      // Create container
      const container = document.createElement('div');
      container.className = `InputField ${variant}`;
      container.dataset.state = state;
      container.dataset.variant = variant;
      if (text) container.classList.add('entered');

      // Create label
      const labelEl = document.createElement('label');
      labelEl.className = `InputField__label${showLabel ? '' : ' hidden'}`;
      labelEl.textContent = label;
      labelEl.htmlFor = id;

      // Create wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'InputField__wrapper';

      // Create prefix
      const prefix = document.createElement('span');
      prefix.className = `InputField__prefix${showLText ? '' : ' hidden'}`;
      prefix.textContent = smallText;

      // Create input
      const input = document.createElement('input');
      input.className = 'InputField__input';
      input.type = 'text';
      input.id = id;
      input.placeholder = help;
      input.value = text;

      // Create suffix
      const suffixEl = document.createElement('span');
      suffixEl.className = `InputField__suffix${showRText ? '' : ' hidden'}`;
      suffixEl.textContent = suffix;

      // Create icon (Lucide: chevron-down)
      const icon = document.createElement('span');
      icon.className = `InputField__icon${showRIcon ? '' : ' hidden'}`;
      icon.innerHTML = getIcon('chevron-down');

      // Handle state changes
      input.addEventListener('input', (e) => {
        if (e.target.value) {
          container.classList.add('entered');
          container.dataset.state = 'entered';
        } else {
          container.classList.remove('entered');
          container.dataset.state = 'default';
        }
        if (onChange) onChange(e.target.value);
      });

      // Assemble
      wrapper.appendChild(prefix);
      wrapper.appendChild(input);
      wrapper.appendChild(suffixEl);
      wrapper.appendChild(icon);
      container.appendChild(labelEl);
      container.appendChild(wrapper);

      return container;
    }

    // Initialize existing InputFields to handle state changes
    document.querySelectorAll('.InputField').forEach(field => {
      const input = field.querySelector('.InputField__input');
      if (input) {
        // Set initial state based on value
        if (input.value) {
          field.classList.add('entered');
          field.dataset.state = 'entered';
        }
        
        // Handle input changes
        input.addEventListener('input', (e) => {
          if (e.target.value) {
            field.classList.add('entered');
            field.dataset.state = 'entered';
          } else {
            field.classList.remove('entered');
            field.dataset.state = 'default';
          }
        });
      }
    });

    // Sample data for metrics (matching Figma design)
    const defaultMetrics = [
      { id: 'metric-0', name: 'Click through rate', abbreviation: 'CTR', min: 0.695, max: 0.925 },
      { id: 'metric-1', name: 'Conversion rate', abbreviation: 'CR', min: 0.695, max: 0.925 },
    ];

    // Variant badge colors
    const variantColors = ['variant-a', 'variant-b', 'variant-c', 'variant-d'];
    const variantLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

    // Sample data for events with variants
    const defaultEvents = [
      {
        id: 'event-0',
        name: 'Landing page',
         hasVariants: false,
        variants: []
      },
      {
        id: 'event-1',
        name: 'Conversion button',
        hasVariants: true,
        variants: [
          { id: 'var-0-0', name: 'Control', traffic: 50, metrics: { ctr: 0.695, cr: 0.425 } },
          { id: 'var-0-1', name: 'Variation A', traffic: 50, metrics: { ctr: 0.725, cr: 0.480 } },
        ]
      },
      {
        id: 'event-2',
        name: 'Checkout page',
         hasVariants: false,
        variants: []
      },
    ];

    /**
     * Creates a metric row matching the Figma design
     * Layout: [Metric name input (with abbreviation)] [Min] [-] [Max] [Delete]
     */
    function createMetricRow(metric, index) {
      const row = document.createElement('div');
      row.className = 'metric-row';
      row.id = metric.id || `metric-${index}`;

      // Metric name input field (flex: 1)
      const nameFieldDiv = document.createElement('div');
      nameFieldDiv.className = 'metric-name-field';
      const nameField = createInputField({
        id: `metric-name-${index}`,
        label: 'Metric',
        showLabel: true,
        showRText: true,
        suffix: metric.abbreviation || '',
        help: 'Enter metric name',
        text: metric.name || '',
        variant: 'vertical'
      });
      nameFieldDiv.appendChild(nameField);

      // Min/Max range container
      const rangeContainer = document.createElement('div');
      rangeContainer.className = 'metric-range-container';

      // Min field
      const minFieldDiv = document.createElement('div');
      minFieldDiv.className = 'metric-range-field';
      const minField = createInputField({
        id: `metric-min-${index}`,
        label: 'Min',
        showLabel: true,
        help: '0.00',
        text: metric.min !== undefined ? String(metric.min) : '',
        variant: 'vertical'
      });
      minFieldDiv.appendChild(minField);

      // Separator (-)
      const separator = document.createElement('div');
      separator.className = 'metric-range-separator';
      separator.innerHTML = '<span>-</span>';

      // Max field
      const maxFieldDiv = document.createElement('div');
      maxFieldDiv.className = 'metric-range-field';
      const maxField = createInputField({
        id: `metric-max-${index}`,
        label: 'Max',
        showLabel: true,
        help: '1.00',
        text: metric.max !== undefined ? String(metric.max) : '',
        variant: 'vertical'
      });
      maxFieldDiv.appendChild(maxField);

      rangeContainer.appendChild(minFieldDiv);
      rangeContainer.appendChild(separator);
      rangeContainer.appendChild(maxFieldDiv);

      // Delete button (Lucide: trash-2)
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'metric-delete-btn';
      deleteBtn.type = 'button';
      deleteBtn.innerHTML = getIcon('trash-2');
      deleteBtn.title = 'Delete metric';
      deleteBtn.onclick = (e) => {
        e.preventDefault();
        metrics.splice(metrics.indexOf(metric), 1);
        renderMetrics(metrics);
      };

      // Assemble row
      row.appendChild(nameFieldDiv);
      row.appendChild(rangeContainer);
      row.appendChild(deleteBtn);

      // Store references for data sync
      const nameInput = nameField.querySelector('.InputField__input');
      const minInput = minField.querySelector('.InputField__input');
      const maxInput = maxField.querySelector('.InputField__input');
      const suffixEl = nameField.querySelector('.InputField__suffix');

      // Sync inputs to metric data
      const syncData = () => {
        metric.name = nameInput.value.trim();
        metric.min = parseFloat(minInput.value) || '';
        metric.max = parseFloat(maxInput.value) || '';
        // Auto-generate abbreviation from name
        if (metric.name && !metric.abbreviation) {
          const words = metric.name.split(' ');
          metric.abbreviation = words.map(w => w[0]).join('').toUpperCase();
          suffixEl.textContent = metric.abbreviation;
          suffixEl.classList.remove('hidden');
        }
        updateMetricsCount();
      };

      nameInput.addEventListener('change', syncData);
      minInput.addEventListener('change', syncData);
      maxInput.addEventListener('change', syncData);

      return row;
    }

    function updateMetricsCount() {
      const countEl = document.getElementById('metricsCount');
      const count = metrics.filter(m => m.name).length;
      countEl.textContent = count > 0 ? `${count} metric${count !== 1 ? 's' : ''}` : '';
    }

    function renderMetrics(metrics) {
      const list = document.getElementById('metricsList');
      const emptyState = document.getElementById('metricsEmptyState');
      list.innerHTML = '';

      if (!metrics || metrics.length === 0) {
        emptyState.classList.remove('hidden');
        list.style.display = 'none';
        updateMetricsCount();
        return;
      }

      emptyState.classList.add('hidden');
      list.style.display = 'flex';

      metrics.forEach((m, i) => {
        const row = createMetricRow(m, i);
        list.appendChild(row);
      });

      updateMetricsCount();
    }

    /**
     * Creates a variant card with all inputs
     */
    function createVariantCard(variant, variantIndex, eventIndex) {
      const card = document.createElement('div');
      card.className = 'variant-card';
      card.id = variant.id;

      // Variant badge (A, B, C...)
      const badge = document.createElement('div');
      badge.className = `variant-badge ${variantColors[variantIndex % variantColors.length]}`;
      badge.textContent = variantLetters[variantIndex];

      // Content area
      const content = document.createElement('div');
      content.className = 'variant-content';

      // Row 1: Variant name + Traffic split
      const row1 = document.createElement('div');
      row1.className = 'variant-row';

      const nameFieldDiv = document.createElement('div');
      nameFieldDiv.className = 'variant-name-field';
      const nameField = createInputField({
        id: `variant-name-${eventIndex}-${variantIndex}`,
        label: 'Variant name',
        showLabel: false,
        help: 'Enter variant name',
        text: variant.name || '',
        variant: 'vertical'
      });
      nameFieldDiv.appendChild(nameField);

      const trafficFieldDiv = document.createElement('div');
      trafficFieldDiv.className = 'variant-traffic-field';
      const trafficField = createInputField({
        id: `variant-traffic-${eventIndex}-${variantIndex}`,
        label: 'Traffic',
        showLabel: false,
        showRText: false,
        suffix: '%',
        help: '50',
        text: variant.traffic !== undefined ? String(variant.traffic) : '',
        variant: 'vertical'
      });
      trafficFieldDiv.appendChild(trafficField);

      row1.appendChild(nameFieldDiv);
      row1.appendChild(trafficFieldDiv);

      // Row 2: Metrics inputs
      const row2 = document.createElement('div');
      row2.className = 'variant-metrics-row';

      // CTR metric field
      const ctrFieldDiv = document.createElement('div');
      ctrFieldDiv.className = 'variant-metric-field';
      const ctrField = createInputField({
        id: `variant-ctr-${eventIndex}-${variantIndex}`,
        label: 'CTR',
        showLabel: true,
        help: '0.00',
        text: variant.metrics?.ctr !== undefined ? String(variant.metrics.ctr) : '',
        variant: 'vertical'
      });
      ctrFieldDiv.appendChild(ctrField);

      // CR metric field
      const crFieldDiv = document.createElement('div');
      crFieldDiv.className = 'variant-metric-field';
      const crField = createInputField({
        id: `variant-cr-${eventIndex}-${variantIndex}`,
        label: 'CR',
        showLabel: true,
        help: '0.00',
        text: variant.metrics?.cr !== undefined ? String(variant.metrics.cr) : '',
        variant: 'vertical'
      });
      crFieldDiv.appendChild(crField);

      row2.appendChild(ctrFieldDiv);
      row2.appendChild(crFieldDiv);

      content.appendChild(row1);
      content.appendChild(row2);

      // Actions (remove variant)
      const actions = document.createElement('div');
      actions.className = 'variant-actions';

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'variant-action-btn remove';
      removeBtn.innerHTML = getIcon('minus');
      removeBtn.title = 'Remove variant';
      removeBtn.onclick = () => {
        events[eventIndex].variants.splice(variantIndex, 1);
        if (events[eventIndex].variants.length === 0) {
          events[eventIndex].hasVariants = false;
        }
        renderEvents(events);
      };

      actions.appendChild(removeBtn);

      // Assemble card
      card.appendChild(badge);
      card.appendChild(content);
      card.appendChild(actions);

      // Drag and drop functionality
      card.draggable = true;
      card.dataset.eventIndex = eventIndex;
      card.dataset.variantIndex = variantIndex;

      card.addEventListener('dragstart', (e) => {
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({ eventIndex, variantIndex }));
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });

      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      card.addEventListener('drop', (e) => {
        e.preventDefault();
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        const fromEventIndex = data.eventIndex;
        const fromVariantIndex = data.variantIndex;
        const toEventIndex = parseInt(card.dataset.eventIndex);
        const toVariantIndex = parseInt(card.dataset.variantIndex);

        // Only reorder within the same event
        if (fromEventIndex === toEventIndex && fromVariantIndex !== toVariantIndex) {
          const variants = events[fromEventIndex].variants;
          const [movedVariant] = variants.splice(fromVariantIndex, 1);
          variants.splice(toVariantIndex, 0, movedVariant);
          renderEvents(events);
        }
      });

      return card;
    }

    /**
     * Creates an event row with optional variants
     */
    function createEventRow(event, eventIndex, totalEvents) {
      const row = document.createElement('div');
      row.className = 'event-row';
      row.id = event.id;

      // Main row (step badge + input + actions)
      const mainRow = document.createElement('div');
      mainRow.className = 'event-row-main';

      // Step indicator with flow lines
      const stepDiv = document.createElement('div');
      stepDiv.className = 'event-step';
      
      // Flow line above (if not first event)
      if (eventIndex > 0) {
        const flowLineAbove = document.createElement('div');
        flowLineAbove.className = 'event-flow-line';
        stepDiv.appendChild(flowLineAbove);
      }
      
      const stepBadge = document.createElement('div');
      stepBadge.className = 'event-step-badge';
      stepBadge.textContent = String(eventIndex + 1);
      stepDiv.appendChild(stepBadge);

      // Flow line below (if not last event or has variants)
      if (eventIndex < totalEvents - 1 || event.hasVariants) {
        const flowLine = document.createElement('div');
        flowLine.className = 'event-flow-line';
        stepDiv.appendChild(flowLine);
      }

      // Event name input
      const inputContainer = document.createElement('div');
      inputContainer.className = 'event-input-container';
      const eventInput = createInputField({
        id: `event-name-${eventIndex}`,
        label: 'Event',
        showLabel: false,
        help: 'Event name',
        text: event.name || '',
        variant: 'horizontal'
      });
      inputContainer.appendChild(eventInput);

      // Actions (add variant + delete)
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'event-actions';

      // Add variant button (Lucide: git-branch-plus)
      const addVariantBtn = document.createElement('button');
      addVariantBtn.type = 'button';
      addVariantBtn.className = 'event-action-btn add-variant';
      addVariantBtn.innerHTML = getIcon('git-branch-plus');
      addVariantBtn.title = 'Add variant';
      addVariantBtn.onclick = () => {
        event.hasVariants = true;
        event.variants.push({
          id: `var-${eventIndex}-${event.variants.length}`,
          name: '',
          traffic: '',
          metrics: { ctr: '', cr: '' },
          isWinner: false
        });
        renderEvents(events);
      };

      // Delete button (Lucide: trash-2)
      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'event-action-btn delete';
      deleteBtn.innerHTML = getIcon('trash-2');
      deleteBtn.title = 'Delete event';
      deleteBtn.onclick = () => {
        events.splice(eventIndex, 1);
        renderEvents(events);
      };

      actionsDiv.appendChild(addVariantBtn);
      actionsDiv.appendChild(deleteBtn);

      mainRow.appendChild(stepDiv);
      mainRow.appendChild(inputContainer);
      mainRow.appendChild(actionsDiv);
      row.appendChild(mainRow);

      // Variants container (if this event has variants)
      if (event.hasVariants || event.variants?.length > 0) {
        const variantsContainer = document.createElement('div');
        variantsContainer.className = 'event-variants-container';

        // Step indicator for variants (mirrors event-step structure)
        const variantsStep = document.createElement('div');
        variantsStep.className = 'event-variants-step';

        const variantsLine = document.createElement('div');
        variantsLine.className = 'event-variants-line';
        variantsStep.appendChild(variantsLine);

        const variantsList = document.createElement('div');
        variantsList.className = 'variants-list';

        // Render each variant card
        event.variants.forEach((variant, vIndex) => {
          const variantCard = createVariantCard(variant, vIndex, eventIndex);
          variantsList.appendChild(variantCard);
        });

        variantsContainer.appendChild(variantsStep);
        variantsContainer.appendChild(variantsList);
        row.appendChild(variantsContainer);
      }

      // Sync input to event data
      const nameInput = eventInput.querySelector('.InputField__input');
      nameInput.addEventListener('change', () => {
        event.name = nameInput.value.trim();
        updateEventsCount();
      });

      return row;
    }

    /**
     * Updates the events count display
     */
    function updateEventsCount() {
      const countEl = document.getElementById('eventsCount');
      const eventCount = events.filter(e => e.name).length;
      const variantCount = events.reduce((sum, e) => sum + (e.variants?.length || 0), 0);
      countEl.textContent = `${eventCount} event${eventCount !== 1 ? 's' : ''} • ${variantCount} variant${variantCount !== 1 ? 's' : ''}`;
    }

    /**
     * Renders the complete events/flow section
     */
    function renderEvents(eventsList) {
      const list = document.getElementById('eventsList');
      const emptyState = document.getElementById('eventsEmptyState');
      list.innerHTML = '';

      if (!eventsList || eventsList.length === 0) {
        emptyState.classList.remove('hidden');
        list.style.display = 'none';
        updateEventsCount();
        return;
      }

      emptyState.classList.add('hidden');
      list.style.display = 'flex';

      eventsList.forEach((event, index) => {
        const eventRow = createEventRow(event, index, eventsList.length);
        list.appendChild(eventRow);
      });

      updateEventsCount();
    }

    let metrics = JSON.parse(JSON.stringify(defaultMetrics));
    let events = JSON.parse(JSON.stringify(defaultEvents));

    renderMetrics(metrics);
    renderEvents(events);

    document.getElementById('exp-form').onsubmit = (e) => {
      e.preventDefault();
      const experimentName = document.getElementById('experimentName').value.trim();
      const experimentDescription = document.getElementById('experimentDescription').value.trim();
      const experimentStatus = document.getElementById('experimentStatus').value;
      const rolledoutVariant = document.getElementById('rolledoutVariant').value;
      const figmaLink = document.getElementById('figmaLink').value.trim();
      const jiraLink = document.getElementById('jiraLink').value.trim();
      const miroLink = document.getElementById('miroLink').value.trim();

      // Collect filled metrics only
      const filledMetrics = metrics
        .filter(m => m.name)
        .map(m => ({ 
          name: m.name, 
          abbreviation: m.abbreviation,
          min: m.min,
          max: m.max
        }));

      parent.postMessage({ pluginMessage: {
        type: 'create-flow',
        payload: {
          experimentName,
          experimentDescription,
          experimentStatus,
          rolledoutVariant: experimentStatus === 'rollout' ? rolledoutVariant : null,
          figmaLink,
          jiraLink,
          miroLink,
          metrics: filledMetrics,
          events: JSON.parse(JSON.stringify(events))
        }
      } }, '*');
    };

    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    document.querySelector('.btn-add-metric').onclick = (e) => {
      e.preventDefault();
      metrics.push({ 
        id: `metric-${Date.now()}`,
        name: '',
        abbreviation: '',
        min: '',
        max: ''
      });
      renderMetrics(metrics);
    };

    document.querySelector('.btn-add-event').onclick = (e) => {
      e.preventDefault();
      events.push({
        id: `event-${Date.now()}`,
        name: '',
        hasVariants: false,
        variants: []
      });
      renderEvents(events);
    };

    // Links section expand/collapse
    document.getElementById('linksHeader').onclick = () => {
      const subsection = document.getElementById('linksSubsection');
      subsection.classList.toggle('collapsed');
    };

    // ============================================
    // EXPERIMENT STATUS & ROLLED-OUT FUNCTIONALITY
    // ============================================
    
    /**
     * Get all variants from all events
     * @returns {Array} Array of variant objects with event context
     */
    function getAllVariants() {
      const allVariants = [];
      events.forEach((event, eventIndex) => {
        if (event.variants && event.variants.length > 0) {
          event.variants.forEach((variant, variantIndex) => {
            allVariants.push({
              ...variant,
              eventIndex,
              variantIndex,
              eventName: event.name || `Event ${eventIndex + 1}`,
              displayName: variant.name || `Variant ${variantLetters[variantIndex]}`
            });
          });
        }
      });
      return allVariants;
    }

    /**
     * Update the rolled-out variant dropdown options based on available variants
     */
    function updateRolledoutOptions() {
      const rolledoutSelect = document.getElementById('rolledoutVariant');
      const allVariants = getAllVariants();
      
      // Clear existing options
      rolledoutSelect.innerHTML = '';
      
      if (allVariants.length === 0) {
        // No variants available
        const option = document.createElement('option');
        option.value = '';
        option.disabled = true;
        option.selected = true;
        option.textContent = 'To select, add variants';
        rolledoutSelect.appendChild(option);
      } else {
        // Add placeholder option
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.disabled = true;
        placeholder.selected = true;
        placeholder.textContent = 'Select variant...';
        rolledoutSelect.appendChild(placeholder);
        
        // Add variant options
        allVariants.forEach((variant) => {
          const option = document.createElement('option');
          option.value = variant.id;
          option.textContent = variant.displayName;
          rolledoutSelect.appendChild(option);
        });
      }
    }

    /**
     * Handle status dropdown change
     */
    function handleStatusChange() {
      const statusSelect = document.getElementById('experimentStatus');
      const rolledoutField = document.getElementById('rolledoutField');
      
      if (statusSelect.value === 'rollout') {
        rolledoutField.classList.remove('hidden');
        updateRolledoutOptions();
      } else {
        rolledoutField.classList.add('hidden');
      }
    }

    // Initialize status dropdown handler
    document.getElementById('experimentStatus').addEventListener('change', handleStatusChange);

    // Override renderEvents to also update rolled-out options when variants change
    const originalRenderEvents = renderEvents;
    renderEvents = function(eventsList) {
      originalRenderEvents(eventsList);
      // Update rolled-out dropdown if it's visible
      const statusSelect = document.getElementById('experimentStatus');
      if (statusSelect.value === 'rollout') {
        updateRolledoutOptions();
      }
    };
  </script>
</body>
</html>
